<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Новая тестовая v82.20</title>
<style>
body{margin:0;min-height:100dvh;display:grid;place-items:center;padding:20px;box-sizing:border-box;font-family:Arial,sans-serif;background:#111;color:#fff}main{width:min(560px,100%);padding:24px;border:1px solid #343434;border-radius:18px;background:#1a1a1a;box-sizing:border-box}h1{margin:0 0 10px;font-size:24px}p{margin:0;color:#c9c9c9;line-height:1.5}.status{margin-top:14px;color:#ffd15c}.error{color:#ff9b90}button{width:100%;min-height:50px;margin-top:18px;border:0;border-radius:12px;background:#f7b500;color:#171717;font-weight:900;font-size:16px}
</style>
</head>
<body>
<main>
<h1>Свежая тестовая v82.20</h1>
<p>Без перенаправления, без reset.html и без CDN-ссылки в адресной строке.</p>
<p id="status" class="status">Проверяем именно новую сборку…</p>
<button id="retry" type="button" hidden>Повторить</button>
</main>
<script>
(() => {
  const status=document.querySelector('#status');
  const retry=document.querySelector('#retry');
  async function launch(){
    retry.hidden=true;
    status.className='status';
    status.textContent='Загружаем новую сборку v82.20…';
    try{
      const response=await fetch('./test-v82-20.html?fresh=8220b',{cache:'no-store'});
      if(!response.ok)throw new Error(`HTTP ${response.status}`);
      const html=await response.text();
      const required=[
        "window.PMK_TEST_VERSION='82.20'",
        'event-provider-badges-v82-20.js',
        'week-touch-scroll-v82-20.js',
        'test-version-label-v82-20.js',
        "const FIX_COMMIT='441ed37fa5029a524c6c3ee73828050a513e76f2'"
      ];
      const missing=required.find(marker=>!html.includes(marker));
      if(missing)throw new Error(`Нет маркера новой сборки: ${missing}`);
      document.open();
      document.write(html);
      document.close();
    }catch(error){
      status.className='status error';
      status.textContent=`Новая сборка не открылась: ${error.message}`;
      retry.hidden=false;
    }
  }
  retry.addEventListener('click',launch);
  launch();
})();
</script>
</body>
</html>
