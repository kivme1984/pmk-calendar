<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow">
  <title>ПМК · Тест умного ввода</title>
  <style>
    html,body{margin:0;min-height:100%;background:#171717;color:#fff;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .boot{min-height:100vh;display:grid;place-items:center;padding:24px;text-align:center}.boot strong{font-size:24px}.boot span{display:block;margin-top:8px;opacity:.72}
  </style>
</head>
<body>
  <div class="boot"><div><strong>Загружаю тестовую форму ПМК</strong><span>Рабочий календарь не изменяется автоматически.</span></div></div>
  <script>
    (async () => {
      const response = await fetch('./index.html?smart-parser-form-source=1', { cache: 'no-store' });
      if (!response.ok) throw new Error(`Не удалось загрузить форму: ${response.status}`);
      let html = await response.text();
      html = html.replace('<title>ПМК Календарь</title>', '<title>ПМК · Тест умного ввода</title>');
      html = html.replace('</head>', '<link rel="stylesheet" href="./smart-parser-form-adapter.css?v=2"></head>');
      const scripts = [
        '<script src="./smart-parser-next-core.js?v=4" defer></' + 'script>',
        '<script src="./smart-parser-next.js?v=4" defer></' + 'script>',
        '<script src="./smart-parser-next-refinements.js?v=4" defer></' + 'script>',
        '<script src="./smart-parser-next-real-rules.js?v=4" defer></' + 'script>',
        '<script src="./smart-parser-next-scope-rules.js?v=2" defer></' + 'script>',
        '<script src="./smart-parser-next-final-rules.js?v=1" defer></' + 'script>',
        '<script src="./smart-parser-form-adapter.js?v=2" defer></' + 'script>',
      ].join('');
      html = html.replace('</body>', `${scripts}</body>`);
      document.open();
      document.write(html);
      document.close();
    })().catch(error => {
      document.body.innerHTML = `<div class="boot"><div><strong>Тестовая форма не загрузилась</strong><span>${String(error.message || error)}</span></div></div>`;
    });
  </script>
</body>
</html>
