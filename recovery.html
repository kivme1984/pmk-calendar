<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
<meta http-equiv="Pragma" content="no-cache">
<title>Восстановление ПМК Календаря</title>
<style>
body{margin:0;min-height:100dvh;display:grid;place-items:center;padding:16px;box-sizing:border-box;font-family:Arial,sans-serif;color:#f5f5f5;background:#111}
main{width:min(560px,100%);padding:24px;border:1px solid #343434;border-radius:18px;background:#1a1a1a;box-sizing:border-box;box-shadow:0 24px 70px rgba(0,0,0,.38)}
h1{margin:0 0 10px;font-size:25px;line-height:1.15}p{margin:0 0 10px;color:#c9c9c9;line-height:1.5}.status{margin-top:16px;color:#9fe0b8}.error{color:#ff9b90}.small{font-size:13px;color:#aaa}.progress{height:9px;margin-top:14px;border-radius:999px;background:#303030;overflow:hidden}.progress>span{display:block;width:4%;height:100%;border-radius:inherit;background:#f7b500;transition:width .2s ease}.actions{display:grid;gap:10px;margin-top:18px}button,a{min-height:48px;display:grid;place-items:center;border:0;border-radius:12px;padding:0 16px;font-weight:800;font-size:15px;text-decoration:none;box-sizing:border-box}button{color:#171717;background:#f7b500}a{color:#fff;background:#303030}
</style>
</head>
<body>
<main>
<h1>Восстановление приложения</h1>
<p>Сначала чистим старые кэши, затем заново устанавливаем service worker, чтобы приложение открылось не в базовой старой версии, а с полной сборкой.</p>
<p class="small">Данные заявок и настройки календаря не удаляются.</p>
<p id="status" class="status">Подготовка…</p>
<div class="progress"><span id="bar"></span></div>
<div class="actions">
<button id="retry" type="button" hidden>Повторить восстановление</button>
<a id="open" href="./?recovery=manual" hidden>Открыть приложение</a>
</div>
</main>
<script>
(()=>{
  const status=document.querySelector('#status');
  const bar=document.querySelector('#bar');
  const retry=document.querySelector('#retry');
  const open=document.querySelector('#open');
  const set=(text,percent)=>{status.textContent=text;bar.style.width=percent+'%';};
  const sleep=ms=>new Promise(resolve=>setTimeout(resolve,ms));

  async function unregisterAll(){
    if(!('serviceWorker' in navigator))return;
    const registrations=await navigator.serviceWorker.getRegistrations();
    await Promise.all(registrations.map(reg=>reg.unregister().catch(()=>false)));
  }

  async function deleteCaches(){
    if(!('caches' in window))return;
    const keys=await caches.keys();
    await Promise.all(keys.map(key=>caches.delete(key).catch(()=>false)));
  }

  function clearFlags(){
    try{
      localStorage.removeItem('pmk-installed-version');
      localStorage.removeItem('pmk-installed-build-token');
      localStorage.removeItem('pmk-release-dismissed');
      sessionStorage.removeItem('pmk-update-later-token');
    }catch{}
  }

  function waitForActivation(registration){
    const worker=registration.installing||registration.waiting||registration.active;
    if(!worker||worker.state==='activated')return Promise.resolve();
    return new Promise((resolve,reject)=>{
      const timeout=setTimeout(()=>reject(new Error('service worker не активировался за 60 секунд')),60000);
      worker.addEventListener('statechange',()=>{
        if(worker.state==='activated'){clearTimeout(timeout);resolve();}
        if(worker.state==='redundant'){clearTimeout(timeout);reject(new Error('браузер отклонил установку service worker'));}
      });
    });
  }

  async function installFreshWorker(){
    if(!('serviceWorker' in navigator))throw new Error('Chrome не поддерживает service worker');
    const stamp=Date.now();
    const registration=await navigator.serviceWorker.register('./sw.js?recovery='+stamp,{updateViaCache:'none'});
    await registration.update().catch(()=>null);
    await waitForActivation(registration);
    await navigator.serviceWorker.ready;
  }

  async function recover(){
    retry.hidden=true;
    open.hidden=true;
    status.className='status';
    try{
      set('Отключаем старый service worker…',18);
      await unregisterAll();
      set('Удаляем старые кэши приложения…',36);
      await deleteCaches();
      set('Сбрасываем метки обновления…',50);
      clearFlags();
      await sleep(350);
      set('Ставим свежий service worker и полную сборку…',70);
      await installFreshWorker();
      set('Готово. Открываем календарь с полной сборкой…',100);
      open.hidden=false;
      location.replace('./?recovery=installed&t='+Date.now());
    }catch(error){
      status.className='status error';
      status.textContent='Восстановление остановилось: '+error.message;
      bar.style.width='100%';
      retry.hidden=false;
      open.hidden=false;
    }
  }
  retry.addEventListener('click',recover);
  recover();
})();
</script>
</body>
</html>
