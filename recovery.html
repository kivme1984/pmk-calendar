<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Восстановление ПМК Календаря</title>
<style>
body{margin:0;min-height:100dvh;display:grid;place-items:center;padding:16px;box-sizing:border-box;font-family:Arial,sans-serif;color:#f5f5f5;background:#111}
main{width:min(560px,100%);padding:24px;border:1px solid #343434;border-radius:18px;background:#1a1a1a;box-shadow:0 24px 70px rgba(0,0,0,.38)}
h1{margin:0 0 10px;font-size:25px}p{margin:0;color:#c9c9c9;line-height:1.5}.status{margin-top:16px;color:#ffd15c}.error{color:#ff9b90}.actions{display:grid;gap:10px;margin-top:18px}button,a{min-height:48px;display:grid;place-items:center;border:0;border-radius:12px;padding:0 16px;font-weight:800;font-size:15px;text-decoration:none;box-sizing:border-box}button{color:#171717;background:#f7b500}a{color:#fff;background:#303030}
</style>
</head>
<body>
<main>
<h1>Восстановление ПМК Календаря</h1>
<p>Рабочие данные, настройки Google, локальные заявки и черновики не удаляются. Заменяется только повреждённый кэш приложения.</p>
<p id="status" class="status">Проверяем новую сборку…</p>
<div class="actions">
<button id="retry" type="button" hidden>Повторить восстановление</button>
<a id="open" href="./?v=63-recovery" hidden>Открыть приложение</a>
</div>
</main>
<script>
(() => {
  const VERSION='63';
  const status=document.querySelector('#status');
  const retry=document.querySelector('#retry');
  const open=document.querySelector('#open');
  const delay=ms=>new Promise(resolve=>setTimeout(resolve,ms));

  function waitForActivation(registration){
    const worker=registration.installing||registration.waiting||registration.active;
    if(!worker)return Promise.resolve();
    if(worker.state==='activated')return Promise.resolve();
    return new Promise((resolve,reject)=>{
      const timeout=setTimeout(()=>reject(new Error('Новая сборка не активировалась.')),12000);
      worker.addEventListener('statechange',()=>{
        if(worker.state==='activated'){
          clearTimeout(timeout);
          resolve();
        }
        if(worker.state==='redundant'){
          clearTimeout(timeout);
          reject(new Error('Установка новой сборки была отклонена.'));
        }
      });
    });
  }

  async function recover(){
    retry.hidden=true;
    open.hidden=true;
    status.className='status';
    status.textContent='Проверяем новую сборку…';
    try{
      const check=await fetch(`./sw.js?v=${VERSION}-check-${Date.now()}`,{cache:'no-store'});
      if(!check.ok)throw new Error('Файл новой сборки пока недоступен.');
      status.textContent='Устанавливаем безопасное обновление…';
      if(!('serviceWorker' in navigator))throw new Error('Браузер не поддерживает восстановление приложения.');
      const registration=await navigator.serviceWorker.register(`./sw.js?v=${VERSION}-recovery-${Date.now()}`,{updateViaCache:'none'});
      await registration.update().catch(()=>null);
      await waitForActivation(registration);
      status.textContent='Сборка восстановлена. Открываем приложение…';
      open.hidden=false;
      await delay(450);
      location.replace(`./?v=${VERSION}&recovery=${Date.now()}`);
    }catch(error){
      status.className='status error';
      status.textContent=`Не удалось восстановить автоматически: ${error.message}`;
      retry.hidden=false;
      open.hidden=false;
    }
  }

  retry.addEventListener('click',recover);
  recover();
})();
</script>
</body>
</html>
