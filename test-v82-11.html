<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>ПМК Календарь · тест v82.11</title>
<style>
body{margin:0;min-height:100dvh;display:grid;place-items:center;padding:16px;box-sizing:border-box;font-family:Arial,sans-serif;color:#f5f5f5;background:#111}main{width:min(590px,100%);padding:24px;border:1px solid #343434;border-radius:18px;background:#1a1a1a;box-sizing:border-box}h1{margin:0 0 10px;font-size:25px}p{margin:0 0 8px;color:#c9c9c9;line-height:1.5}.status{margin-top:16px;color:#ffd15c}.error{color:#ff9b90}.progress{height:9px;margin-top:14px;border-radius:999px;background:#303030;overflow:hidden}.progress span{display:block;width:5%;height:100%;border-radius:inherit;background:#f7b500;transition:width .2s ease}.actions{display:grid;gap:10px;margin-top:18px}button,a{width:100%;min-height:48px;display:grid;place-items:center;border:0;border-radius:12px;padding:0 16px;box-sizing:border-box;font-weight:800;font-size:15px;text-decoration:none}button{color:#171717;background:#f7b500}a{color:#fff;background:#303030}
</style>
</head>
<body>
<main>
<h1>Полный тест v82.11</h1>
<p>Без установки. Исправлены переключение «Неделя/Месяц», подвал карточки, четыре быстрых действия в одну строку и понятный индикатор версии.</p>
<p id="status" class="status">Подготовка…</p>
<div class="progress"><span id="bar"></span></div>
<div class="actions"><button id="retry" type="button" hidden>Повторить запуск</button><a id="openStable" href="./?v=82-8" hidden>Открыть рабочую v82.8</a></div>
</main>
<script>
(() => {
  const status=document.querySelector('#status');
  const bar=document.querySelector('#bar');
  const retry=document.querySelector('#retry');
  const openStable=document.querySelector('#openStable');
  const set=(text,percent)=>{status.textContent=text;bar.style.width=`${percent}%`;};

  async function verify(stamp){
    const files=['./index.html','./final-ui-v82-10.js','./final-ui-v82-10.css','./final-hotfix-v82-11.js','./final-hotfix-v82-11.css','./pmk-release.json'];
    const responses=await Promise.all(files.map(url=>fetch(`${url}?check=${stamp}`,{cache:'no-store'})));
    const failed=responses.find(response=>!response.ok);
    if(failed)throw new Error(`Не опубликован файл ${failed.url.split('/').pop()} (${failed.status})`);
    const hotfix=await responses[3].text();
    if(!hotfix.includes('PMK_FINAL_HOTFIX_V82_11'))throw new Error('Неверный файл исправлений v82.11');
    return responses[0].text();
  }

  async function launch(){
    retry.hidden=true;openStable.hidden=true;status.className='status';
    try{
      const stamp=Date.now();
      set('Рабочую версию не изменяем…',15);
      set('Проверяем исправления v82.11…',35);
      let html=await verify(stamp);
      set('Подключаем исправления к полной версии…',70);
      const closeScript='</scr'+'ipt>';
      const guard=`<script>window.PMK_V82_ISOLATED_TEST=true;window.PMK_TEST_VERSION='82.11';${closeScript}`;
      const css=`<link rel="stylesheet" href="final-ui-v82-10.css?v=${stamp}"><link rel="stylesheet" href="final-hotfix-v82-11.css?v=${stamp}">`;
      const js=`<script src="final-ui-v82-10.js?v=${stamp}" defer>${closeScript}<script src="final-hotfix-v82-11.js?v=${stamp}" defer>${closeScript}`;
      html=html.replace(/<link rel="manifest"[^>]*>/i,'');
      html=html.replace(/<link rel="stylesheet"[^>]*>/i,match=>`${match}${css}`);
      html=html.replace(/<script\s+src="app\.js(?:\?[^\"]*)?"\s+defer><\/script>/i,`${guard}<script src="app.js?test-v82-11=${stamp}" defer>${closeScript}${js}`);
      html=html.replace('<title>ПМК Календарь</title>','<title>ПМК Календарь · тест v82.11</title>');
      set('Открываем тест…',100);
      document.open();document.write(html);document.close();
    }catch(error){
      status.className='status error';
      status.textContent=`Тест не запустился: ${error.message}`;
      bar.style.width='100%';
      retry.hidden=false;openStable.hidden=false;
    }
  }

  retry.addEventListener('click',launch);
  launch();
})();
</script>
</body>
</html>
