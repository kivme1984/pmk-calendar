<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Обновление ПМК до v89</title>
<style>
body{margin:0;min-height:100dvh;display:grid;place-items:center;padding:16px;box-sizing:border-box;font-family:Arial,sans-serif;color:#f5f5f5;background:#111}
main{width:min(580px,100%);padding:24px;border:1px solid #343434;border-radius:18px;background:#1a1a1a}
h1{margin:0 0 10px;font-size:25px}p{margin:0 0 8px;color:#c9c9c9;line-height:1.5}.status{margin-top:16px;color:#9fe0b8}.error{color:#ff9b90}
.actions{display:grid;gap:10px;margin-top:18px}button,a{min-height:48px;display:grid;place-items:center;border:0;border-radius:12px;padding:0 16px;font-weight:800;font-size:15px;text-decoration:none;box-sizing:border-box}button{color:#171717;background:#f7b500}a{color:#fff;background:#303030}
</style>
</head>
<body>
<main>
<h1>Устанавливаем версию v89</h1>
<p>Исправляем вертикальное расположение четырёх статусов.</p>
<p>Возвращаем горизонтальный и вертикальный свайп в режимах «3 дня» и «Неделя».</p>
<p>Запускаем полную повторную загрузку событий Google Calendar.</p>
<p id="status" class="status">Проверяем файлы…</p>
<div class="actions">
<button id="retry" hidden>Повторить</button>
<a id="safe" href="./safe.html?v=89" hidden>Безопасный режим</a>
<a id="open" href="./?v=89" hidden>Открыть приложение</a>
</div>
</main>
<script>
(() => {
  const VERSION = '89';
  const status = document.querySelector('#status');
  const retry = document.querySelector('#retry');
  const open = document.querySelector('#open');
  const safe = document.querySelector('#safe');

  function waitForActivation(registration) {
    const worker = registration.installing || registration.waiting || registration.active;
    if (!worker || worker.state === 'activated') return Promise.resolve();
    return new Promise((resolve, reject) => {
      const timeout = setTimeout(() => reject(new Error('Сборка не активировалась')), 45000);
      worker.addEventListener('statechange', () => {
        if (worker.state === 'activated') { clearTimeout(timeout); resolve(); }
        if (worker.state === 'redundant') { clearTimeout(timeout); reject(new Error('Установка отклонена')); }
      });
    });
  }

  async function verify() {
    const stamp = Date.now();
    const urls = [
      './sw.js', './sw-special-router-v89.js', './sw-core-v89.js',
      './mobile-workflow-fixes-v89.js', './mobile-workflow-fixes-v89.css',
      './version-guard-v89.js', './version.json'
    ];
    const responses = await Promise.all(urls.map(url => fetch(`${url}?v=${VERSION}-${stamp}`, { cache:'no-store' })));
    if (responses.some(response => !response.ok)) throw new Error('Файлы v89 ещё не опубликованы');
    const [swText, routerText, coreText, jsText, cssText, guardText] = await Promise.all(responses.slice(0, 6).map(response => response.text()));
    if (!swText.includes('sw-special-router-v89.js') || !swText.includes('sw-core-v89.js')) throw new Error('Пока отдаётся старая версия service worker');
    if (!routerText.includes('stopImmediatePropagation')) throw new Error('Маршрутизатор обновления не готов');
    if (!coreText.includes('mobile-workflow-fixes-v89.js') || !coreText.includes('mobile-workflow-fixes-v89.css')) throw new Error('Пакет v89 неполный');
    if (!jsText.includes('PMK_MOBILE_WORKFLOW_FIXES_V89') || !jsText.includes('clearFastSyncCheckpoint')) throw new Error('Исправление синхронизации не опубликовано');
    if (!cssText.includes('pmk-status-column-v89') || !cssText.includes('repeat(4, minmax(56px, 1fr))')) throw new Error('Вертикальная колонка статусов не опубликована');
    if (!guardText.includes("const VERSION = '89'")) throw new Error('Контроль версии v89 не готов');
  }

  async function run() {
    retry.hidden = true;
    open.hidden = true;
    safe.hidden = true;
    status.className = 'status';
    status.textContent = 'Проверяем сборку v89…';
    try {
      await verify();
      if (!('serviceWorker' in navigator)) throw new Error('Service Worker не поддерживается');
      const registration = await navigator.serviceWorker.register(`./sw.js?v=${VERSION}-${Date.now()}`, { updateViaCache:'none' });
      await registration.update().catch(() => null);
      await waitForActivation(registration);
      status.textContent = 'v89 установлена. Открываем приложение и загружаем Google Calendar…';
      open.hidden = false;
      setTimeout(() => location.replace(`./?v=${VERSION}&verified=${Date.now()}`), 650);
    } catch (error) {
      status.className = 'status error';
      status.textContent = `Обновление не завершено: ${error.message}`;
      retry.hidden = false;
      open.hidden = false;
      safe.hidden = false;
    }
  }

  retry.addEventListener('click', run);
  run();
})();
</script>
</body>
</html>
