<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Обновление ПМК Календаря до v82.43.0</title>
  <style>
    body{margin:0;min-height:100dvh;display:grid;place-items:center;padding:16px;box-sizing:border-box;font-family:Arial,sans-serif;color:#f5f5f5;background:#111}
    main{width:min(560px,100%);padding:24px;border:1px solid #343434;border-radius:18px;background:#1a1a1a;box-shadow:0 24px 70px rgba(0,0,0,.38)}
    h1{margin:0 0 10px;font-size:25px}p{margin:0 0 14px;color:#c9c9c9;line-height:1.5}.status{color:#9fe0b8}.error{color:#ff9b90}
    .actions{display:grid;gap:10px;margin-top:18px}button,a{min-height:48px;display:grid;place-items:center;border:0;border-radius:12px;padding:0 16px;font-weight:800;font-size:15px;text-decoration:none;box-sizing:border-box}button{color:#fff;background:#1f7e4c}a{color:#fff;background:#303030}
  </style>
</head>
<body>
  <main>
    <h1>Устанавливаем v82.43.0</h1>
    <p>Статусные кнопки стали уже, а карточка заказа уплотнена: меньше пустых интервалов без изменения стиля и функций.</p>
    <p id="status" class="status">Проверяем файлы обновления.</p>
    <div class="actions">
      <button id="install" type="button">Установить</button>
      <a href="./?v=82.43.0">Открыть приложение</a>
      <a href="./safe.html?v=82.43.0">Безопасный режим</a>
    </div>
  </main>
  <script>
    const VERSION='82.43.0';
    const status=document.getElementById('status');
    const button=document.getElementById('install');
    async function check(path,marker){
      const response=await fetch(path+'?verify='+Date.now(),{cache:'no-store'});
      if(!response.ok)throw new Error(path+': HTTP '+response.status);
      const text=await response.text();
      if(!text.includes(marker))throw new Error(path+': старая версия');
    }
    async function run(){
      button.disabled=true;
      status.className='status';
      status.textContent='Проверяем v82.43.0...';
      try{
        await check('./sw.js','PMK Calendar v82.43.0');
        await check('./sw-core-v82.js',"const VERSION='82.43.0'");
        await check('./update-manager-v82-20.js','PMK_UPDATE_MANAGER_V82_43');
        await check('./status-left-column-v82-2.js','PMK_DAY_CARD_TIGHT_V82_43');
        await check('./day-save-guard-v82-40.js','PMK_SAVE_GUARD_V82_40');
        if(!('serviceWorker' in navigator))throw new Error('Нет поддержки service worker');
        status.textContent='Обновляем кэш...';
        const reg=await navigator.serviceWorker.register('./sw.js?v='+VERSION+'-'+Date.now(),{updateViaCache:'none'});
        await reg.update();
        status.textContent='Готово. Открываем приложение...';
        location.href='./?v='+VERSION+'&verified='+Date.now();
      }catch(e){
        status.className='status error';
        status.textContent='Обновление не завершено: '+e.message;
        button.disabled=false;
      }
    }
    button.addEventListener('click',run);
    run();
  </script>
</body>
</html>
