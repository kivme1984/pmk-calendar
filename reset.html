<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Обновление ПМК Календаря до v82.27.0</title><style>body{margin:0;min-height:100dvh;display:grid;place-items:center;padding:16px;box-sizing:border-box;font-family:Arial,sans-serif;color:#f5f5f5;background:#111}main{width:min(560px,100%);padding:24px;border:1px solid #343434;border-radius:18px;background:#1a1a1a;box-shadow:0 24px 70px rgba(0,0,0,.38)}h1{margin:0 0 10px;font-size:25px}p{margin:0;color:#c9c9c9;line-height:1.5}.status{margin-top:16px;color:#9fe0b8}.error{color:#ff9b90}.actions{display:grid;gap:10px;margin-top:18px}button,a{min-height:48px;display:grid;place-items:center;border:0;border-radius:12px;padding:0 16px;font-weight:800;font-size:15px;text-decoration:none;box-sizing:border-box}button{color:#fff;background:#1f7e4c}a{color:#fff;background:#303030}</style></head><body><main><h1>Устанавливаем основную версию v82.27.0</h1><p>В недельном режиме возвращаем время, статус и район, оставляя карточку короткой.</p><p id="status" class="status">Проверяем файлы обновления…</p><div class="actions"><button id="retry" type="button" hidden>Повторить обновление</button><a id="safe" href="./safe.html?v=82.27.0" hidden>Открыть безопасный режим</a><a id="open" href="./?v=82.27.0" hidden>Открыть приложение</a></div></main><script>(()=>{const VERSION='82.27.0';const status=document.querySelector('#status');const retry=document.querySelector('#retry');const safe=document.querySelector('#safe');const open=document.querySelector('#open');async function check(path,marker){const r=await fetch(path+'?verify='+Date.now(),{cache:'no-store'});if(!r.ok)throw new Error(path+': HTTP '+r.status);const t=await r.text();if(!t.includes(marker))throw new Error(path+': получена старая версия файла')}async function verify(){await check('./sw.js','PMK Calendar v82.27.0');await check('./sw-core-v82.js',"const VERSION='82.27.0'");await check('./weekly-minimal-v82-26.js','PMK_WEEKLY_WORK_INFO_V82_27');await check('./workflow-ui-cleanup-v82-19-2.js','PMK_ORDER_SOURCE_PRICING_SECTION_V82_25');await check('./android-autofill-off-v53.js','PMK_GOOGLE_AUTOFILL_SAVE_OFF_V82_24')}function wait(reg){const w=reg.installing||reg.waiting;if(!w||w.state==='activated')return Promise.resolve();return new Promise((res,rej)=>{const timer=setTimeout(()=>rej(new Error('Новая сборка не активировалась')),45000);w.addEventListener('statechange',()=>{if(w.state==='activated'){clearTimeout(timer);res()}if(w.state==='redundant'){clearTimeout(timer);rej(new Error('Установка сборки была отклонена'))}})})}async function update(){retry.hidden=true;safe.hidden=true;open.hidden=true;status.className='status';status.textContent='Проверяем недельные карточки со временем, статусом и районом…';try{await verify();if(!('serviceWorker'in navigator))throw new Error('Этот браузер не поддерживает обновление приложения');status.textContent='Устанавливаем пакет v82.27.0…';const reg=await navigator.serviceWorker.register('./sw.js?v='+VERSION+'-'+Date.now(),{updateViaCache:'none'});await reg.update();await wait(reg);status.textContent='v82.27.0 установлена. Открываем приложение…';open.hidden=false;setTimeout(()=>location.replace('./?v='+VERSION+'&verified='+Date.now()),900)}catch(e){status.className='status error';status.textContent='Обновление не завершено: '+e.message;retry.hidden=false;safe.hidden=false;open.hidden=false}}retry.addEventListener('click',update);update()})();</script></body></html>
