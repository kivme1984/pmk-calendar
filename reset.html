<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Обновление ПМК Календаря</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      color: #f5f5f5;
      background: #111;
    }
    main {
      width: min(520px, calc(100vw - 32px));
      padding: 24px;
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 14px;
      background: #181818;
    }
    h1 { margin: 0 0 12px; font-size: 24px; }
    p { margin: 0; color: #c9c9c9; line-height: 1.5; }
  </style>
</head>
<body>
  <main>
    <h1>Устанавливаем версию v42</h1>
    <p>Новые поля длины и ширины ковра теперь открываются пустыми — можно сразу вводить размеры без удаления значений.</p>
  </main>
  <script>
    (async () => {
      try {
        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map(registration => registration.unregister()));
        }

        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map(key => caches.delete(key)));
        }
      } finally {
        location.replace('./?v=42&reset=' + Date.now());
      }
    })();
  </script>
</body>
</html>
