<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Обновление ПМК Календаря</title>
  <style>
    body{margin:0;min-height:100dvh;display:grid;place-items:center;padding:16px;box-sizing:border-box;font-family:Arial,sans-serif;color:#f5f5f5;background:#111}
    main{width:min(560px,100%);padding:24px;border:1px solid #343434;border-radius:18px;background:#1a1a1a;box-shadow:0 24px 70px rgba(0,0,0,.38)}
    h1{margin:0 0 10px;font-size:25px}p{margin:0 0 14px;color:#c9c9c9;line-height:1.5}.status{color:#9fe0b8}.error{color:#ff9b90}
    .actions{display:grid;gap:10px;margin-top:18px}button,a{min-height:48px;display:grid;place-items:center;border:0;border-radius:12px;padding:0 16px;font-weight:800;font-size:15px;text-decoration:none;box-sizing:border-box}button{color:#fff;background:#1f7e4c}a{color:#fff;background:#303030}
  </style>
</head>
<body>
  <main>
    <h1 id="title">Устанавливаем v82.20.0</h1>
    <p id="description">Cardfix25: убраны дубли в адресном автопоиске и примеры внутри полей.</p>
    <p id="status" class="status">Подготовка обновления.</p>
    <div class="actions">
      <button id="install" type="button">Установить</button>
      <a href="./?v=82.20.0">Открыть приложение</a>
      <a href="./recovery.html?manual=1">Восстановление</a>
    </div>
  </main>
  <script>
    const VERSION='82.20.0';
    const BUILD='cardfix25-address-placeholders-empty';
    const SW_FILE='./sw-cardfix25.js';
    const params=new URLSearchParams(location.search);
    const stage=params.get('stage')||'1';
    const status=document.getElementById('status');
    const button=document.getElementById('install');
    function sleep(ms){return new Promise(resolve=>setTimeout(resolve,ms));}
    async function clearWorkersAndCaches(){
      if('serviceWorker' in navigator){
        const regs=await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.map(reg=>reg.unregister().catch(()=>null)));
      }
      if(window.caches){
        const keys=await caches.keys();
        await Promise.all(keys.filter(key=>key.startsWith('pmk-calendar-v')).map(key=>caches.delete(key)));
      }
    }
    async function check(path,marker){
      const response=await fetch(path+'?verify='+Date.now(),{cache:'reload'});
      if(!response.ok)throw new Error(path+': HTTP '+response.status);
      const text=await response.text();
      if(!text.includes(marker))throw new Error(path+': файл не обновился');
    }
    function reloadClean(){location.replace('./reset.html?stage=2&release='+BUILD+'-'+Date.now());}
    async function run(){
      button.disabled=true;
      status.className='status';
      try{
        if(stage!=='2'){
          status.textContent='Отключаем старый service worker и чистим кэш...';
          await clearWorkersAndCaches();
          await sleep(350);
          status.textContent='Перезапускаем reset без старого кэша...';
          reloadClean();
          return;
        }
        status.textContent='Проверяем свежие файлы v82.20.0 / '+BUILD+'...';
        await clearWorkersAndCaches();
        await check(SW_FILE,"const BUILD='cardfix25-address-placeholders-empty'");
        await check('./pmk-google-auth-config.json','Постоянный вход Google');
        await check('./version.json','cardfix12-draft-counter-working');
        await check('./status-left-column-v82-2.js','PMK_STATUS_LEFT_NO_JUMP_V82_20_7');
        await check('./event-card-approved-v82-20-1.js','PMK_EVENT_CARD_STABLE_RENDER_WITH_CLOUD_V82_20_7');
        await check('./event-card-status-polish-v82-20-2.js','PMK_SUMMARY_COUNTERS_V82_20_7');
        await check('./header-search-v82-20-8.js','PMK_DRAFT_COUNTER_V82_20_12');
        await check('./smart-paste-compact-v82-20-13.js','PMK_SMART_PASTE_COMPACT_V82_20_13');
        await check('./v50-preview-compact-fix-v82-20-16.js','PMK_V50_PREVIEW_COMPACT_FIX_V82_20_16');
        await check('./v50-editor-nav-bottom-v82-20-21.js','PMK_V50_EDITOR_NAV_BOTTOM_COMPACT_V82_20_21');
        await check('./form-title-cancel-row-v82-20-22.js','PMK_FORM_TITLE_CANCEL_ROW_V82_20_22');
        await check('./address-search-clean-v82-20-23.js','PMK_ADDRESS_SEARCH_CLEAN_STRICT_V82_20_24');
        await check('./form-placeholders-address-strict-v82-20-25.js','PMK_FORM_PLACEHOLDERS_ADDRESS_STRICT_V82_20_25');
        if(!('serviceWorker' in navigator))throw new Error('Нет поддержки service worker');
        status.textContent='Ставим свежий service worker cardfix25...';
        const reg=await navigator.serviceWorker.register(SW_FILE,{scope:'./',updateViaCache:'none'});
        await reg.update();
        status.textContent='Готово. Открываем приложение...';
        location.href='./?v='+VERSION+'&cardfix='+BUILD+'&t='+Date.now();
      }catch(e){
        status.className='status error';
        status.textContent='Обновление не завершено: '+e.message;
        button.disabled=false;
      }
    }
    button.addEventListener('click',run);
    run();
  </script>
</body>
</html>
