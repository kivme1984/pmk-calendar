<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Безопасное обновление ПМК Календаря до v80</title>
<style>
body{margin:0;min-height:100dvh;display:grid;place-items:center;padding:16px;box-sizing:border-box;font-family:Arial,sans-serif;color:#f5f5f5;background:#111}main{width:min(560px,100%);padding:24px;border:1px solid #343434;border-radius:18px;background:#1a1a1a;box-shadow:0 24px 70px rgba(0,0,0,.38)}h1{margin:0 0 10px;font-size:25px}p{margin:0;color:#c9c9c9;line-height:1.5}.status{margin-top:16px;color:#9fe0b8}.error{color:#ff9b90}.actions{display:grid;gap:10px;margin-top:18px}button,a{min-height:48px;display:grid;place-items:center;border:0;border-radius:12px;padding:0 16px;font-weight:800;font-size:15px;text-decoration:none;box-sizing:border-box}button{color:#fff;background:#1f7e4c}a{color:#fff;background:#303030}
</style>
</head>
<body>
<main>
<h1>Устанавливаем версию v80</h1>
<p>Версия проверена на двух событиях: обычной заявке Яндекса и старой заявке с зеркалом календаря.</p>
<p id="status" class="status">Проверяем все файлы новой сборки…</p>
<div class="actions"><button id="retry" type="button" hidden>Повторить обновление</button><a id="safe" href="./safe.html?v=80" hidden>Открыть безопасный режим</a><a id="open" href="./?v=80" hidden>Открыть приложение</a></div>
</main>
<script>
(() => {
  const VERSION='80';
  const status=document.querySelector('#status');
  const retry=document.querySelector('#retry');
  const safe=document.querySelector('#safe');
  const open=document.querySelector('#open');
  const delay=ms=>new Promise(resolve=>setTimeout(resolve,ms));

  function waitForActivation(registration){
    const worker=registration.installing||registration.waiting||registration.active;
    if(!worker||worker.state==='activated')return Promise.resolve();
    return new Promise((resolve,reject)=>{
      const timeout=setTimeout(()=>reject(new Error('Новая сборка не активировалась.')),30000);
      worker.addEventListener('statechange',()=>{
        if(worker.state==='activated'){clearTimeout(timeout);resolve();}
        if(worker.state==='redundant'){clearTimeout(timeout);reject(new Error('Установка новой сборки была отклонена.'));}
      });
    });
  }

  async function verifyFiles(){
    const stamp=Date.now();
    const urls=['./sw.js','./version-guard-v80.js','./status-ledger-v80.js','./status-pipeline-v80.js','./completed-workflow-v80.js'];
    const responses=await Promise.all(urls.map(url=>fetch(`${url}?v=${VERSION}-verify-${stamp}`,{cache:'no-store'})));
    if(responses.some(response=>!response.ok))throw new Error('Файлы v80 ещё не распространились на GitHub Pages.');
    const [swText,guardText,ledgerText,pipelineText,completedText]=await Promise.all(responses.map(response=>response.text()));
    if(!swText.includes('sw-core-v80.js'))throw new Error('GitHub Pages пока отдаёт старый service worker. Повторите через минуту.');
    if(!guardText.includes("const VERSION = '80'"))throw new Error('Контрольный файл v80 ещё не опубликован. Повторите через минуту.');
    if(!ledgerText.includes('PMK_STATUS_LEDGER_V80'))throw new Error('Реестр статусов v80 ещё не опубликован. Повторите через минуту.');
    if(!pipelineText.includes('PMK_STATUS_PIPELINE_V80'))throw new Error('Конвейер статусов v80 ещё не опубликован. Повторите через минуту.');
    if(!completedText.includes('PMK_COMPLETED_WORKFLOW_V80'))throw new Error('Раздел выполненных заявок v80 ещё не опубликован. Повторите через минуту.');
  }

  async function update(){
    retry.hidden=true;safe.hidden=true;open.hidden=true;
    status.className='status';status.textContent='Проверяем все файлы версии v80…';
    try{
      await verifyFiles();
      if(!('serviceWorker' in navigator))throw new Error('Браузер не поддерживает обновление приложения.');
      status.textContent='Собираем проверенный пакет v80…';
      const registration=await navigator.serviceWorker.register(`./sw.js?v=${VERSION}-${Date.now()}`,{updateViaCache:'none'});
      await registration.update().catch(()=>null);
      await waitForActivation(registration);
      status.textContent='Версия v80 проверена и установлена. Открываем приложение…';
      open.hidden=false;
      await delay(500);
      location.replace(`./?v=${VERSION}&verified=${Date.now()}`);
    }catch(error){
      status.className='status error';status.textContent=`Обновление не завершено: ${error.message}`;
      retry.hidden=false;safe.hidden=false;open.hidden=false;
    }
  }

  retry.addEventListener('click',update);
  update();
})();
</script>
</body>
</html>
