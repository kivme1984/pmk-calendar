<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Обновление ПМК Календаря до v82.20.0</title>
<style>
body{margin:0;min-height:100dvh;display:grid;place-items:center;padding:16px;box-sizing:border-box;font-family:Arial,sans-serif;color:#f5f5f5;background:#111}main{width:min(560px,100%);padding:24px;border:1px solid #343434;border-radius:18px;background:#1a1a1a;box-shadow:0 24px 70px rgba(0,0,0,.38)}h1{margin:0 0 10px;font-size:25px}p{margin:0;color:#c9c9c9;line-height:1.5}.status{margin-top:16px;color:#9fe0b8}.error{color:#ff9b90}.actions{display:grid;gap:10px;margin-top:18px}button,a{min-height:48px;display:grid;place-items:center;border:0;border-radius:12px;padding:0 16px;font-weight:800;font-size:15px;text-decoration:none;box-sizing:border-box}button{color:#fff;background:#1f7e4c}a{color:#fff;background:#303030}
</style>
</head>
<body>
<main>
<h1 id="title">Устанавливаем основную версию v82.20.0</h1>
<p id="description">Исправленная рабочая форма и подготовка постоянного входа Google без повторного подключения.</p>
<p id="status" class="status">Проверяем файлы обновления…</p>
<div class="actions">
<button id="retry" type="button" hidden>Повторить обновление</button>
<a id="safe" href="./safe.html?v=82.20.0" hidden>Открыть безопасный режим</a>
<a id="open" href="./?v=82.20.0" hidden>Открыть приложение</a>
</div>
</main>
<script>
(() => {
  const params=new URLSearchParams(location.search);
  const smartParserMode=params.get('smart-parser')==='1';
  const requestedTest=params.get('test');
  if(requestedTest){
    const allowed=new Set(['82-9','82-10','82-11','82-12','82-16','82-17','82-19','82-20']);
    if(allowed.has(requestedTest)){
      params.delete('test');
      const suffix=params.toString();
      location.replace(`./test-v${requestedTest}.html${suffix?`?${suffix}`:''}`);
      return;
    }
  }

  const VERSION='82.20.0';
  const status=document.querySelector('#status');
  const retry=document.querySelector('#retry');
  const safe=document.querySelector('#safe');
  const open=document.querySelector('#open');
  const title=document.querySelector('#title');
  const description=document.querySelector('#description');

  if(smartParserMode){
    title.textContent='Подготавливаем умный ввод для v82.20.0';
    description.textContent='Тестовый режим запускается отдельно и не изменяет обычную работу календаря.';
    open.href='./?v=82.20.0&smart-parser=1';
    open.textContent='Открыть умный ввод';
  }

  async function verify(){
    const stamp=Date.now();
    const checks=[
      ['./sw.js','PMK Calendar v82.20.0'],
      ['./sw-core-v82.js',"const VERSION='82.20.0'"],
      ['./sw-core-v82.js','persistent-google-auth-v82-20.js'],
      ['./persistent-google-auth-v82-20.js','PMK_PERSISTENT_GOOGLE_AUTH_V82_20'],
      ['./persistent-google-auth-v82-20.css','.pmk-persistent-google-card'],
      ['./pmk-google-auth-config.json','"enabled"'],
      ['./version-guard-v82.js',"const RELEASE = '82.20.0'"],
      ['./workflow-ui-cleanup-v82-19-2.js','PMK_WORKFLOW_UI_CLEANUP_V82_19_2'],
      ['./event-cloud-indicators-v82-19.js','PMK_EVENT_CLOUD_INDICATORS_V82_19'],
      ['./period-direct-v82-19.js','PMK_PERIOD_DIRECT_V82_19'],
      ['./week-touch-scroll-v82-19-stable.js','PMK_WEEK_TOUCH_SCROLL_V82_19_STABLE'],
      ['./smart-parser-feature-gate.js','PMK_SMART_PARSER_FEATURE_GATE']
    ];
    for(const [path,marker] of checks){
      const response=await fetch(`${path}?verify=${stamp}`,{cache:'no-store'});
      if(!response.ok)throw new Error(`${path}: HTTP ${response.status}`);
      const text=await response.text();
      if(!text.includes(marker))throw new Error(`${path}: получена старая версия файла`);
    }
  }

  function waitForActivation(registration){
    const worker=registration.installing||registration.waiting;
    if(!worker)return Promise.resolve();
    if(worker.state==='activated')return Promise.resolve();
    return new Promise((resolve,reject)=>{
      const timer=setTimeout(()=>reject(new Error('Новая сборка не активировалась')),45000);
      worker.addEventListener('statechange',()=>{
        if(worker.state==='activated'){clearTimeout(timer);resolve();}
        if(worker.state==='redundant'){clearTimeout(timer);reject(new Error('Установка сборки была отклонена'));}
      });
    });
  }

  async function update(){
    retry.hidden=true;safe.hidden=true;open.hidden=true;
    status.className='status';
    status.textContent=smartParserMode?'Проверяем умный ввод и сборку v82.20.0…':'Проверяем форму и модуль постоянного входа Google…';
    try{
      await verify();
      if(!('serviceWorker' in navigator))throw new Error('Этот браузер не поддерживает обновление приложения');
      status.textContent=smartParserMode?'Устанавливаем тестовый режим поверх v82.20.0…':'Устанавливаем пакет v82.20.0…';
      const registration=await navigator.serviceWorker.register(`./sw.js?v=${VERSION}-${Date.now()}`,{updateViaCache:'none'});
      await registration.update();
      await waitForActivation(registration);
      status.textContent=smartParserMode?'Умный ввод проверен. Открываем тестовый режим…':'Основная версия v82.20.0 установлена. Открываем приложение…';
      open.hidden=false;
      const target=`./?v=${VERSION}&verified=${Date.now()}${smartParserMode?'&smart-parser=1':''}`;
      setTimeout(()=>location.replace(target),900);
    }catch(error){
      status.className='status error';
      status.textContent=`Обновление не завершено: ${error.message}`;
      retry.hidden=false;safe.hidden=false;open.hidden=false;
    }
  }

  retry.addEventListener('click',update);
  update();
})();
</script>
</body>
</html>
