<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Обновление ПМК Календаря до v82.34.0</title>
  <style>
    body{margin:0;min-height:100dvh;display:grid;place-items:center;padding:16px;box-sizing:border-box;font-family:Arial,sans-serif;color:#f5f5f5;background:#111}
    main{width:min(560px,100%);padding:24px;border:1px solid #343434;border-radius:18px;background:#1a1a1a;box-shadow:0 24px 70px rgba(0,0,0,.38)}
    h1{margin:0 0 10px;font-size:25px}p{margin:0 0 14px;color:#c9c9c9;line-height:1.5}.status{color:#9fe0b8}.error{color:#ff9b90}
    .actions{display:grid;gap:10px;margin-top:18px}button,a{min-height:48px;display:grid;place-items:center;border:0;border-radius:12px;padding:0 16px;font-weight:800;font-size:15px;text-decoration:none;box-sizing:border-box}button{color:#fff;background:#1f7e4c}a{color:#fff;background:#303030}
  </style>
</head>
<body>
  <main>
    <h1>Устанавливаем основную версию v82.34.0</h1>
    <p>Возвращаем нормальный классический месячный календарь: 7 колонок, крупный счётчик заявок в каждом дне и короткие районы с количеством точек.</p>
    <p id="status" class="status">Готово к установке.</p>
    <div class="actions">
      <button id="install" type="button">Установить обновление</button>
      <a href="./?v=82.34.0">Открыть приложение</a>
      <a href="./safe.html?v=82.34.0">Открыть безопасный режим</a>
    </div>
  </main>
  <script>
    const VERSION = '82.34.0';
    const statusBox = document.getElementById('status');
    const installButton = document.getElementById('install');

    async function checkFile(path, marker) {
      const response = await fetch(path + '?verify=' + Date.now(), { cache: 'no-store' });
      if (!response.ok) throw new Error(path + ': HTTP ' + response.status);
      const text = await response.text();
      if (!text.includes(marker)) throw new Error(path + ': старая версия файла');
    }

    async function installUpdate() {
      installButton.disabled = true;
      statusBox.className = 'status';
      statusBox.textContent = 'Проверяем файлы v82.34.0...';
      try {
        await checkFile('./sw.js', 'PMK Calendar v82.34.0');
        await checkFile('./sw-core-v82.js', "const VERSION='82.34.0'");
        await checkFile('./month-summary-v82-28.js', 'PMK_MONTH_CLASSIC_TABLE_V82_34');
        if (!('serviceWorker' in navigator)) throw new Error('Браузер не поддерживает service worker');
        statusBox.textContent = 'Обновляем кэш приложения...';
        const registration = await navigator.serviceWorker.register('./sw.js?v=' + VERSION + '-' + Date.now(), { updateViaCache: 'none' });
        await registration.update();
        statusBox.textContent = 'v82.34.0 установлена. Открываем приложение...';
        window.location.href = './?v=' + VERSION + '&verified=' + Date.now();
      } catch (error) {
        statusBox.className = 'status error';
        statusBox.textContent = 'Обновление не завершено: ' + error.message;
        installButton.disabled = false;
      }
    }

    installButton.addEventListener('click', installUpdate);
    installUpdate();
  </script>
</body>
</html>
