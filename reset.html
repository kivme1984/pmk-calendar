<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Безопасное обновление ПМК Календаря до v78</title>
<style>
body{margin:0;min-height:100dvh;display:grid;place-items:center;padding:16px;box-sizing:border-box;font-family:Arial,sans-serif;color:#f5f5f5;background:#111}main{width:min(560px,100%);padding:24px;border:1px solid #343434;border-radius:18px;background:#1a1a1a;box-shadow:0 24px 70px rgba(0,0,0,.38)}h1{margin:0 0 10px;font-size:25px}p{margin:0;color:#c9c9c9;line-height:1.5}.status{margin-top:16px;color:#9fe0b8}.error{color:#ff9b90}.actions{display:grid;gap:10px;margin-top:18px}button,a{min-height:48px;display:grid;place-items:center;border:0;border-radius:12px;padding:0 16px;font-weight:800;font-size:15px;text-decoration:none;box-sizing:border-box}button{color:#fff;background:#1f7e4c}a{color:#fff;background:#303030}
</style>
</head>
<body>
<main>
<h1>Устанавливаем версию v78</h1>
<p>Проверяем не только service worker, но и контрольный файл версии. Установка не завершится, пока GitHub Pages не отдаёт именно v78.</p>
<p id="status" class="status">Проверяем новую сборку…</p>
<div class="actions"><button id="retry" type="button" hidden>Повторить обновление</button><a id="safe" href="./safe.html?v=78" hidden>Открыть безопасный режим</a><a id="open" href="./?v=78" hidden>Открыть приложение</a></div>
</main>
<script>
(()=>{const VERSION='78',status=document.querySelector('#status'),retry=document.querySelector('#retry'),safe=document.querySelector('#safe'),open=document.querySelector('#open'),delay=ms=>new Promise(r=>setTimeout(r,ms));function waitForActivation(registration){const worker=registration.installing||registration.waiting||registration.active;if(!worker||worker.state==='activated')return Promise.resolve();return new Promise((resolve,reject)=>{const timeout=setTimeout(()=>reject(new Error('Новая сборка не активировалась.')),30000);worker.addEventListener('statechange',()=>{if(worker.state==='activated'){clearTimeout(timeout);resolve()}if(worker.state==='redundant'){clearTimeout(timeout);reject(new Error('Установка новой сборки была отклонена.'))}})})}async function verifyFiles(){const stamp=Date.now();const [swResponse,guardResponse]=await Promise.all([fetch(`./sw.js?v=${VERSION}-verify-${stamp}`,{cache:'no-store'}),fetch(`./version-guard-v78.js?v=${VERSION}-verify-${stamp}`,{cache:'no-store'})]);if(!swResponse.ok||!guardResponse.ok)throw new Error('Файлы v78 ещё не распространились на GitHub Pages.');const [swText,guardText]=await Promise.all([swResponse.text(),guardResponse.text()]);if(!swText.includes('sw-core-v78.js'))throw new Error('GitHub Pages пока отдаёт старый service worker. Нажмите «Повторить обновление» через минуту.');if(!guardText.includes("const VERSION = '78'"))throw new Error('Контрольный файл версии ещё не обновился. Нажмите «Повторить обновление» через минуту.')}async function update(){retry.hidden=true;safe.hidden=true;open.hidden=true;status.className='status';status.textContent='Проверяем файлы именно версии v78…';try{await verifyFiles();if(!('serviceWorker'in navigator))throw new Error('Браузер не поддерживает обновление приложения.');status.textContent='Собираем проверенный локальный пакет v78…';const registration=await navigator.serviceWorker.register(`./sw.js?v=${VERSION}-${Date.now()}`,{updateViaCache:'none'});await registration.update().catch(()=>null);await waitForActivation(registration);status.textContent='Версия v78 проверена и установлена. Открываем приложение…';open.hidden=false;await delay(500);location.replace(`./?v=${VERSION}&verified=${Date.now()}`)}catch(error){status.className='status error';status.textContent=`Обновление не завершено: ${error.message}`;retry.hidden=false;safe.hidden=false;open.hidden=false}}retry.addEventListener('click',update);update()})();
</script>
</body>
</html>
