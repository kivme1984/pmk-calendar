name: Verify PMK v82.11 browser test

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/verify-v82-11-test.yml'
      - 'test-v82-11.html'
      - 'final-hotfix-v82-11.js'
      - 'final-hotfix-v82-11.css'
      - 'pmk-release.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check v82.11 files
        shell: bash
        run: |
          set -euo pipefail
          test -s test-v82-11.html
          test -s final-hotfix-v82-11.js
          test -s final-hotfix-v82-11.css
          node --check final-hotfix-v82-11.js
          python3 -m json.tool pmk-release.json >/dev/null
          grep -q 'PMK_FINAL_HOTFIX_V82_11' final-hotfix-v82-11.js
          grep -q 'test-v82-11' test-v82-11.html
          grep -q '"version": "82.11"' pmk-release.json
