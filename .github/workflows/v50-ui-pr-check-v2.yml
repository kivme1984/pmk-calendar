name: V50 mobile PR check v2

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright@1.53.0
          npx playwright install --with-deps chromium
      - name: Start local site
        run: |
          mkdir -p artifacts
          python3 -m http.server 4173 > /tmp/pmk-http.log 2>&1 &
          sleep 2
      - name: Run diagnostic mobile UI verification
        run: node tests/v50-ui-check-v2.mjs
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v50-mobile-ui-v2
          path: artifacts/*.png
          if-no-files-found: ignore
