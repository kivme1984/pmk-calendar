name: Verify PMK v82.10 browser test

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/verify-v82-10-test.yml'
      - 'test-v82-10.html'
      - 'final-ui-v82-10.js'
      - 'final-ui-v82-10.css'
      - 'pmk-release.json'
      - 'reset.html'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check syntax and required markers
        shell: bash
        run: |
          set -euo pipefail
          test -s test-v82-10.html
          test -s final-ui-v82-10.js
          test -s final-ui-v82-10.css
          test -s pmk-release.json
          node --check final-ui-v82-10.js
          python3 -m json.tool pmk-release.json >/dev/null
          grep -q 'PMK_FINAL_UI_V82_10' final-ui-v82-10.js
          grep -q 'test-v82-10' test-v82-10.html
          grep -q "requestedTest==='82-10'" reset.html
          grep -q '"version": "82.10"' pmk-release.json
