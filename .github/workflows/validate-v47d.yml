name: Diagnose final explicit assignments v47

on:
  push:
    paths:
      - '.github/workflows/validate-v47d.yml'

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run diagnostics
        shell: bash
        run: |
          set +e
          {
            node --check smart-parser-v47-assignments.js
            echo "assignment syntax: $?"
          } > validation-v47d.txt 2>&1
          cat > /tmp/test.js <<'NODE'
          global.window=global;
          global.document={readyState:'loading',addEventListener(){}};
          global.state={selectedDayKey:'2026-06-28'};
          global.businessTodayKey=()=> '2026-06-28';
          global.dateKeyForDisplay=key=>new Date(`${key}T12:00:00Z`);
          global.addDaysToKey=(key,days)=>{const d=new Date(`${key}T12:00:00Z`);d.setUTCDate(d.getUTCDate()+days);return d.toISOString().slice(0,10)};
          global.addMinutesToTime=(value,minutes)=>{const [h,m]=value.split(':').map(Number);const total=h*60+m+minutes;return `${String(Math.floor(total/60)%24).padStart(2,'0')}:${String(total%60).padStart(2,'0')}`};
          global.REQUEST_DURATION_MINUTES=30;
          global.setTimeout=()=>0;
          require(process.cwd()+'/smart-parser-v45.js');
          require(process.cwd()+'/smart-parser-v47.js');
          require(process.cwd()+'/smart-parser-v47-name-fix.js');
          require(process.cwd()+'/smart-parser-v47-assignments.js');
          const text='Зовут Ольга. Два ковра. Первый ковёр размер два на три, синтетика, средний ворс. Второй ковёр размер полтора на два, шегги. Для первого удаление пятен. Для второго расчёсывание ворса.';
          console.log(JSON.stringify(global.PMK_SMART_ASSIGNMENTS_V47.explicitAssignments(text),null,2));
          console.log(JSON.stringify(global.PMK_SMART_PARSER_V45.parseText(text),null,2));
          NODE
          node /tmp/test.js >> validation-v47d.txt 2>&1
          echo "behavior status: $?" >> validation-v47d.txt
          set -e

      - name: Commit diagnostics and remove workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add validation-v47d.txt
          git rm .github/workflows/validate-v47d.yml
          git commit -m "Record final explicit assignment diagnostics"
          git push
