name: V50 mobile UI check

on:
  push:
    branches: [main]
    paths:
      - 'v50-preview.html'
      - 'manager-ui-v50-*.js'
      - 'manager-ui-v50-*.css'
      - 'tests/v50-ui-check.mjs'
      - '.github/workflows/v50-ui-check.yml'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright@1.53.0
          npx playwright install --with-deps chromium
      - name: Start local site
        run: |
          mkdir -p artifacts
          python3 -m http.server 4173 > /tmp/pmk-http.log 2>&1 &
          sleep 2
      - name: Run mobile UI verification
        run: node tests/v50-ui-check.mjs
      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v50-mobile-ui
          path: artifacts/v50-mobile.png
          if-no-files-found: ignore
