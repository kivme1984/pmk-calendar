name: Validate PMK Calendar v46

on:
  push:
    paths:
      - '.github/workflows/validate-v46.yml'

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate JavaScript syntax
        run: |
          node --check cloudflare-worker-dadata-compact.js
          node --check address-mobile-v46.js
          node --check complete-pricing-v45.js
          node --check smart-parser-v45.js
          node --check smart-parser-v45-runtime-fix.js
          node --check sw.js

      - name: Validate release wiring
        run: |
          grep -q "Access-Control-Allow-Origin': '\*'" cloudflare-worker-dadata-compact.js
          grep -q "request.method === 'GET'" cloudflare-worker-dadata-compact.js
          grep -q "GET-CORS-v46" address-mobile-v46.js
          grep -q "manualDiscount" complete-pricing-v45.js
          grep -q "grid-template-rows: repeat(2" unified-rug-services-v43.css
          grep -q "pmk-calendar-v46" sw.js
          grep -q '"version": "46"' version.json

      - name: Remove one-time workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/validate-v46.yml
          git commit -m "Complete v46 validation"
          git push
