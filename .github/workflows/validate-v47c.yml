name: Diagnose final PMK Calendar v47

on:
  push:
    paths:
      - '.github/workflows/validate-v47c.yml'

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run final parser diagnostics
        shell: bash
        run: |
          set +e
          {
            echo '=== syntax ==='
            node --check smart-parser-v45.js
            echo "v45 syntax: $?"
            node --check smart-parser-v47.js
            echo "v47 syntax: $?"
            node --check smart-parser-v47-name-fix.js
            echo "name syntax: $?"
            node --check smart-parser-v47-assignments.js
            echo "assignments syntax: $?"
            node --check complete-pricing-v45.js
            echo "pricing syntax: $?"
            echo '=== behavior ==='
          } > validation-v47c.txt 2>&1

          cat > /tmp/test-v47.js <<'NODE'
          global.window = global;
          global.document = { readyState: 'loading', addEventListener() {} };
          global.state = { selectedDayKey: '2026-06-28' };
          global.businessTodayKey = () => '2026-06-28';
          global.dateKeyForDisplay = key => new Date(`${key}T12:00:00Z`);
          global.addDaysToKey = (key, days) => { const d = new Date(`${key}T12:00:00Z`); d.setUTCDate(d.getUTCDate() + days); return d.toISOString().slice(0, 10); };
          global.addMinutesToTime = (value, minutes) => { const [h,m] = value.split(':').map(Number); const total = h*60+m+minutes; return `${String(Math.floor(total/60)%24).padStart(2,'0')}:${String(total%60).padStart(2,'0')}`; };
          global.REQUEST_DURATION_MINUTES = 30;
          global.setTimeout = () => 0;
          require(process.cwd() + '/smart-parser-v45.js');
          require(process.cwd() + '/smart-parser-v47.js');
          require(process.cwd() + '/smart-parser-v47-name-fix.js');
          require(process.cwd() + '/smart-parser-v47-assignments.js');
          const parse = global.PMK_SMART_PARSER_V45.parseText;
          for (const text of [
            'Клиентка Марина, два ковра: один синтетика средний ворс, второй шегги. На первом пятна, на втором поднятие ворса.',
            'Зовут Ольга. Два ковра. Первый ковёр размер два на три, синтетика, средний ворс. Второй ковёр размер полтора на два, шегги. Для первого удаление пятен. Для второго расчёсывание ворса.'
          ]) {
            console.log('INPUT:', text);
            console.log(JSON.stringify(parse(text), null, 2));
          }
          NODE
          node /tmp/test-v47.js >> validation-v47c.txt 2>&1
          echo "behavior status: $?" >> validation-v47c.txt
          set -e

      - name: Commit diagnostics and remove workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add validation-v47c.txt
          git rm .github/workflows/validate-v47c.yml
          git commit -m "Record final v47 parser diagnostics"
          git push
