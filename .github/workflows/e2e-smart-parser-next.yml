name: Smart Parser Next Corpus Tests

on:
  pull_request:
    branches: [main]
    paths:
      - 'smart-parser-next-core.js'
      - 'ci-check-smart-parser-next.mjs'
      - '.github/workflows/e2e-smart-parser-next.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  parser-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - id: parser_test
        continue-on-error: true
        run: node ci-check-smart-parser-next.mjs > smart-parser-test.log 2>&1
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smart-parser-test-log
          path: smart-parser-test.log
          if-no-files-found: error
      - if: ${{ steps.parser_test.outcome == 'failure' }}
        run: cat smart-parser-test.log && exit 1
