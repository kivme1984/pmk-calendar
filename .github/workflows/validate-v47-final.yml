name: Final verified PMK Calendar v47

on:
  push:
    paths:
      - '.github/workflows/validate-v47-final.yml'

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate exact manager dictation
        run: |
          node --check smart-parser-v45.js
          node --check smart-parser-v47.js
          node --check smart-parser-v47-name-fix.js
          node --check smart-parser-v47-assignments.js
          node --check complete-pricing-v45.js
          cat > /tmp/test.js <<'NODE'
          global.window=global;
          global.document={readyState:'loading',addEventListener(){}};
          global.state={selectedDayKey:'2026-06-28'};
          global.businessTodayKey=()=> '2026-06-28';
          global.dateKeyForDisplay=key=>new Date(`${key}T12:00:00Z`);
          global.addDaysToKey=(key,days)=>{const d=new Date(`${key}T12:00:00Z`);d.setUTCDate(d.getUTCDate()+days);return d.toISOString().slice(0,10)};
          global.addMinutesToTime=(value,minutes)=>{const [h,m]=value.split(':').map(Number);const total=h*60+m+minutes;return `${String(Math.floor(total/60)%24).padStart(2,'0')}:${String(total%60).padStart(2,'0')}`};
          global.REQUEST_DURATION_MINUTES=30;
          global.setTimeout=()=>0;
          require(process.cwd()+'/smart-parser-v45.js');
          require(process.cwd()+'/smart-parser-v47.js');
          require(process.cwd()+'/smart-parser-v47-name-fix.js');
          require(process.cwd()+'/smart-parser-v47-assignments.js');
          const parse=global.PMK_SMART_PARSER_V45.parseText;
          const assert=(ok,msg,data)=>{if(!ok)throw new Error(msg+'\n'+JSON.stringify(data,null,2))};
          const a=parse('Клиентка Марина, два ковра: один синтетика средний ворс, второй шегги. На первом пятна, на втором поднятие ворса.');
          assert(a.customerName==='Марина','name1',a);
          assert(a.rugs.length===2,'count',a);
          assert(a.rugs[0].material==='Синтетика'&&a.rugs[0].pile==='До 1 см','rug1',a);
          assert(a.rugs[0].services.includes('Удаление пятен'),'stain1',a);
          assert(a.rugs[1].material==='Синтетика'&&a.rugs[1].pile==='Более 1 см','rug2',a);
          assert(a.rugs[1].services.includes('Подъём ворса'),'lift2',a);
          assert(!a.startTime&&!a.endTime,'false time1',a);
          const b=parse('Зовут Ольга. Два ковра. Первый ковёр размер два на три, синтетика, средний ворс. Второй ковёр размер полтора на два, шегги. Для первого удаление пятен. Для второго расчёсывание ворса.');
          assert(b.customerName==='Ольга','name2',b);
          assert(b.rugs[0].length===2&&b.rugs[0].width===3,'size1',b);
          assert(b.rugs[0].services.includes('Удаление пятен'),'stain2',b);
          assert(b.rugs[1].length===1.5&&b.rugs[1].width===2,'size2',b);
          assert(b.rugs[1].services.includes('Подъём ворса'),'lift2b',b);
          assert(!b.startTime&&!b.endTime&&!b.street&&!b.houseNumber,'false detections',b);
          console.log('V47_FINAL_OK');
          NODE
          node /tmp/test.js
          grep -q "return qs('#regularCustomer')?.checked ? 10 : 0" complete-pricing-v45.js
          ! grep -q "rugs.length >= 2" complete-pricing-v45.js

      - name: Remove diagnostics and workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for file in validation-v47.txt validation-v47b.txt validation-v47c.txt validation-v47d.txt; do test ! -f "$file" || git rm "$file"; done
          git rm .github/workflows/validate-v47-final.yml
          git commit -m "Complete verified v47 parser release"
          git push
