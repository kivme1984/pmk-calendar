name: Validate PMK Calendar v43

on:
  push:
    paths:
      - '.github/workflows/validate-v43.yml'

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate JavaScript and release wiring
        run: |
          node --check app.js
          node --check auto-pricing-v40.js
          node --check empty-rug-dimensions-v42.js
          node --check unified-rug-services-v43.js
          node --check sw.js
          grep -q "pmk-calendar-v43" sw.js
          grep -q "unified-rug-services-v43.js" sw.js
          grep -q "Удаление пятен" unified-rug-services-v43.js
          grep -q "Вычёсывание шерсти и волос" unified-rug-services-v43.js
          grep -q "Удаление слайма / пластилина" unified-rug-services-v43.js
          grep -q "empty-rug-dimensions-v42.js" sw.js
          grep -q '"version": "43"' version.json

      - name: Remove one-time workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/validate-v43.yml
          git commit -m "Complete v43 validation"
          git push
