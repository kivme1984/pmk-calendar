name: Apply and validate PMK Calendar v45

on:
  push:
    paths:
      - '.github/workflows/validate-v45.yml'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply missing service prices and wire parser
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import json

          pricing = Path('auto-pricing-v40.js')
          text = pricing.read_text()
          text = text.replace(
              "    pileLiftPerM2: 150,\n    minOrder: 1800,",
              "    pileLiftPerM2: 150,\n    disinfectionPerRug: 700,\n    slimePlasticinePerRug: 500,\n    ozonationPerRug: 300,\n    expressPerOrder: 1000,\n    minOrder: 1800,"
          )
          old_manual = "  const MANUAL_PRICE_SERVICES = new Set([\n    'Дезинфекция',\n    'Удаление слайма / пластилина',\n    'Озонация',\n    'Экспресс-стирка',\n  ]);"
          text = text.replace(old_manual, "  const MANUAL_PRICE_SERVICES = new Set();")
          text = text.replace("    let subtotal = 0;\n\n    rugs.forEach", "    let subtotal = 0;\n    let expressAdded = false;\n\n    rugs.forEach")
          marker = """      if (services.includes('Подъём ворса')) {
        const value = Math.round(area * SITE_PRICING.pileLiftPerM2);
        subtotal += value;
        lines.push(`Расчёсывание / подъём ворса: ${area.toFixed(2).replace('.00', '')} м² × ${SITE_PRICING.pileLiftPerM2} ₽ = ${formatMoney(value)}`);
      }
"""
          addition = marker + """      if (services.includes('Дезинфекция')) {
        subtotal += SITE_PRICING.disinfectionPerRug;
        lines.push(`Дезинфекция: ${formatMoney(SITE_PRICING.disinfectionPerRug)}`);
      }
      if (services.includes('Удаление слайма / пластилина')) {
        subtotal += SITE_PRICING.slimePlasticinePerRug;
        lines.push(`Удаление слайма / пластилина: ${formatMoney(SITE_PRICING.slimePlasticinePerRug)}`);
      }
      if (services.includes('Озонация')) {
        subtotal += SITE_PRICING.ozonationPerRug;
        lines.push(`Озонация: ${formatMoney(SITE_PRICING.ozonationPerRug)}`);
      }
      if (services.includes('Экспресс-стирка') && !expressAdded) {
        subtotal += SITE_PRICING.expressPerOrder;
        expressAdded = true;
        lines.push(`Экспресс-заказ: ${formatMoney(SITE_PRICING.expressPerOrder)}`);
      }
"""
          if 'disinfectionPerRug' not in text:
              raise SystemExit('pricing constants insertion failed')
          if "lines.push(`Дезинфекция:" not in text:
              text = text.replace(marker, addition)
          pricing.write_text(text)

          services = Path('unified-rug-services-v43.js')
          text = services.read_text()
          text = text.replace('Дезинфекция · цена вручную', 'Дезинфекция · 700 ₽/ковёр')
          text = text.replace('Удаление слайма / пластилина · цена вручную', 'Удаление слайма / пластилина · 500 ₽/ковёр')
          text = text.replace('Озонация · цена вручную', 'Озонация · 300 ₽/ковёр')
          text = text.replace('Экспресс-стирка · цена вручную', 'Экспресс-стирка · 1000 ₽/заказ')
          services.write_text(text)

          sw = Path('sw.js')
          text = sw.read_text().replace("pmk-calendar-v44", "pmk-calendar-v45").replace("'X-PMK-Version': '44'", "'X-PMK-Version': '45'")
          if "'./smart-parser-v45.js'," not in text:
              text = text.replace("  './smart-paste-lifecycle-v38.js',", "  './smart-paste-lifecycle-v38.js',\n  './smart-parser-v45.js',")
          if "networkText('./smart-parser-v45.js')," not in text:
              text = text.replace("          networkText('./smart-paste-lifecycle-v38.js'),", "          networkText('./smart-paste-lifecycle-v38.js'),\n          networkText('./smart-parser-v45.js'),")
          text = text.replace("auto-pricing-v40.js?v=44", "auto-pricing-v40.js?v=45")
          text = text.replace("unified-rug-services-v43.js?v=44", "unified-rug-services-v43.js?v=45")
          sw.write_text(text)

          reset = Path('reset.html')
          text = reset.read_text().replace('версию v44', 'версию v45').replace('?v=44&reset=', '?v=45&reset=')
          text = text.replace(
              'Синхронизируем весь автоматический расчёт и скидки с калькулятором на сайте «Промой Ковер».',
              'Расширяем голосовое распознавание заявок и добавляем полный расчёт всех дополнительных услуг.'
          )
          reset.write_text(text)

          version = Path('version.json')
          data = json.loads(version.read_text())
          data['version'] = '45'
          data['release'] = 'extended-smart-parser-and-complete-pricing'
          for feature in [
              'voice-friendly-russian-number-parser',
              'spoken-address-and-access-recognition',
              'spoken-rug-dimensions-and-services',
              'disinfection-700-per-rug',
              'slime-plasticine-500-per-rug',
              'ozonation-300-per-rug',
              'express-1000-per-order'
          ]:
              if feature not in data['features']:
                  data['features'].append(feature)
          version.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n')
          PY

      - name: Validate JavaScript syntax
        run: |
          node --check smart-parser-v45.js
          node --check auto-pricing-v40.js
          node --check unified-rug-services-v43.js
          node --check sw.js

      - name: Validate voice parser behavior
        run: |
          cat > /tmp/test-parser.js <<'NODE'
          global.window = global;
          global.document = { readyState: 'complete', addEventListener() {} };
          global.qs = () => null;
          global.state = { selectedDayKey: '2026-06-28' };
          global.businessTodayKey = () => '2026-06-28';
          global.dateKeyForDisplay = key => new Date(`${key}T12:00:00Z`);
          global.addDaysToKey = (key, days) => { const d = new Date(`${key}T12:00:00Z`); d.setUTCDate(d.getUTCDate() + days); return d.toISOString().slice(0, 10); };
          global.addMinutesToTime = (value, minutes) => { const [h,m] = value.split(':').map(Number); const total = h*60+m+minutes; return `${String(Math.floor(total/60)%24).padStart(2,'0')}:${String(total%60).padStart(2,'0')}`; };
          global.REQUEST_DURATION_MINUTES = 30;
          global.setTimeout = () => 0;
          require(process.cwd() + '/smart-parser-v45.js');
          const parser = global.PMK_SMART_PARSER_V45;
          const parsed = parser.parseText('Клиент Ольга. Адрес улица Коминтерна дом сто пятнадцать, квартира сорок пять, пятый подъезд, третий этаж. Ковер шегги два на три, пятна, шерсть, дезинфекция, озонация и расчесывание ворса. Постоянный клиент, завтра с трех до пяти вечера.');
          const assert = (ok, message) => { if (!ok) throw new Error(message + '\n' + JSON.stringify(parsed, null, 2)); };
          assert(parsed.customerName === 'Ольга', 'Имя');
          assert(parsed.street.toLowerCase().includes('коминтерна'), 'Улица');
          assert(parsed.houseNumber === '115', 'Дом словами');
          assert(parsed.apartmentNumber === '45', 'Квартира словами');
          assert(parsed.entrance === '5', 'Подъезд словами');
          assert(parsed.floor === '3', 'Этаж словами');
          assert(parsed.rugs.length === 1 && parsed.rugs[0].length === 2 && parsed.rugs[0].width === 3, 'Размер словами');
          assert(parsed.rugs[0].material === 'Синтетика' && parsed.rugs[0].pile === 'Более 1 см', 'Шегги');
          assert(parsed.rugs[0].services.includes('Удаление пятен'), 'Пятна');
          assert(parsed.rugs[0].services.includes('Вычёсывание шерсти и волос'), 'Шерсть');
          assert(parsed.rugs[0].services.includes('Дезинфекция'), 'Дезинфекция');
          assert(parsed.rugs[0].services.includes('Озонация'), 'Озонация');
          assert(parsed.rugs[0].services.includes('Подъём ворса'), 'Расчёсывание');
          assert(parsed.regularCustomer, 'Постоянный клиент');
          assert(parsed.startTime === '15:00' && parsed.endTime === '17:00', 'Время словами');
          NODE
          node /tmp/test-parser.js

      - name: Validate complete pricing
        run: |
          grep -q "disinfectionPerRug: 700" auto-pricing-v40.js
          grep -q "slimePlasticinePerRug: 500" auto-pricing-v40.js
          grep -q "ozonationPerRug: 300" auto-pricing-v40.js
          grep -q "expressPerOrder: 1000" auto-pricing-v40.js
          grep -q "smart-parser-v45.js" sw.js
          grep -q "pmk-calendar-v45" sw.js
          grep -q '"version": "45"' version.json

      - name: Commit release and remove workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add auto-pricing-v40.js unified-rug-services-v43.js smart-parser-v45.js sw.js reset.html version.json
          git rm .github/workflows/validate-v45.yml
          git commit -m "Release extended smart parser and complete pricing v45"
          git push
