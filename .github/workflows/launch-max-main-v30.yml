name: Launch MAX main activity

on:
  push:
    paths:
      - '.github/workflows/launch-max-main-v30.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Launch MAX like the launcher icon
        run: |
          python3 - <<'PY'
          from pathlib import Path

          app_path = Path('app.js')
          app = app_path.read_text(encoding='utf-8')

          old = '''  const maxHomeUrl = 'https://max.ru/';
            if (/Android/i.test(navigator.userAgent)) {
              const fallback = encodeURIComponent(maxHomeUrl);
              window.location.href = `intent://max.ru/#Intent;scheme=https;package=ru.oneme.app;S.browser_fallback_url=${fallback};end`;
              return;
            }

            window.location.href = maxHomeUrl;'''

          new = '''  if (/Android/i.test(navigator.userAgent)) {
              window.location.href = 'intent:#Intent;action=android.intent.action.MAIN;category=android.intent.category.LAUNCHER;package=ru.oneme.app;end';
              return;
            }

            window.location.href = 'https://max.ru/';'''

          if old not in app:
              raise SystemExit('Current MAX home block not found')
          app = app.replace(old, new, 1)
          app_path.write_text(app, encoding='utf-8')

          index_path = Path('index.html')
          index = index_path.read_text(encoding='utf-8')
          index = index.replace('styles.css?v=29', 'styles.css?v=30')
          index = index.replace('app.js?v=29', 'app.js?v=30')
          index_path.write_text(index, encoding='utf-8')

          reset_path = Path('reset.html')
          reset = reset_path.read_text(encoding='utf-8')
          reset = reset.replace('?v=29&reset=', '?v=30&reset=')
          reset_path.write_text(reset, encoding='utf-8')

          sw_path = Path('sw.js')
          sw = sw_path.read_text(encoding='utf-8')
          sw = sw.replace('pmk-calendar-v29', 'pmk-calendar-v30')
          sw = sw.replace('styles.css?v=29', 'styles.css?v=30')
          sw = sw.replace('app.js?v=29', 'app.js?v=30')
          sw_path.write_text(sw, encoding='utf-8')
          PY

      - name: Validate
        run: |
          node --check app.js
          grep -q 'android.intent.action.MAIN' app.js
          grep -q 'android.intent.category.LAUNCHER' app.js
          ! grep -q 'intent://max.ru' app.js
          grep -q 'app.js?v=30' index.html
          grep -q 'pmk-calendar-v30' sw.js

      - name: Commit and clean up
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/launch-max-main-v30.yml
          git add app.js index.html reset.html sw.js
          git commit -m "Launch MAX main activity"
          git push
