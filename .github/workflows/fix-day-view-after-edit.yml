name: Fix day view after editing

on:
  push:
    paths:
      - '.github/workflows/fix-day-view-after-edit.yml'

permissions:
  contents: write

jobs:
  patch:
    if: github.event.head_commit.message != 'Fix day view after editing'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch app.js
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('app.js')
          text = path.read_text(encoding='utf-8')

          old_view = "const targetView = view === 'delivery-waiting' ? 'today' : (['day','three-days','week','month'].includes(view) ? 'week' : view);"
          new_view = "const targetView = (view === 'day' || view === 'delivery-waiting') ? 'today' : (['three-days','week','month'].includes(view) ? 'week' : view);"
          if old_view not in text:
              raise SystemExit('setView target mapping was not found')
          text = text.replace(old_view, new_view, 1)

          old_save = "  state.selectedDayKey = data.visitDate || state.selectedDayKey;\n  state.periodAnchorKey = state.selectedDayKey;\n  resetForm();"
          new_save = "  state.selectedDayKey = data.visitDate || state.selectedDayKey;\n  state.periodAnchorKey = state.selectedDayKey;\n  if (state.token && !localOnly) await refreshEvents();\n  resetForm();"
          if old_save not in text:
              raise SystemExit('saveRequest return block was not found')
          text = text.replace(old_save, new_save, 1)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Check JavaScript syntax
        run: node --check app.js

      - name: Commit fix and remove one-time workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/fix-day-view-after-edit.yml
          git add app.js
          git commit -m "Fix day view after editing"
          git push
