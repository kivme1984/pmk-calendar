name: Add manager planner UI
on:
  push:
    paths:
      - '.github/workflows/manager-planner-ui.yml'
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Patch index
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p=Path('index.html'); s=p.read_text(encoding='utf-8')
          old='''                </div>\n                <div class="field-grid three">\n                  <label class="field">Дата *<input type="date" id="visitDate" name="visitDate" required /></label>'''
          new='''                </div>\n                <div id="managerSlotPlanner" class="manager-slot-planner">\n                  <div class="manager-slot-heading"><div><strong>Подходящие окна по району</strong><small id="managerSlotHint">Сначала выберите район клиента.</small></div><span class="manager-only-badge">Для менеджера</span></div>\n                  <div id="recommendedSlots" class="recommended-slots"></div>\n                </div>\n                <p class="manual-time-label">Или укажите дату и время вручную</p>\n                <div class="field-grid three">\n                  <label class="field">Дата *<input type="date" id="visitDate" name="visitDate" required /></label>'''
          if old not in s: raise SystemExit('time marker missing')
          s=s.replace(old,new,1)
          old='''                <div id="routeHint" class="info-box">Выберите район и дату — появится проверка маршрута.</div>\n                <div id="conflictHint" class="info-box hidden"></div>\n              </section>'''
          new='''                <div id="routeHint" class="info-box">Выберите район и дату — появится проверка маршрута.</div>\n                <div id="conflictHint" class="info-box hidden"></div>\n                <div id="routeExceptionPanel" class="route-exception-panel hidden">\n                  <div class="route-exception-title"><strong>Время вне районного маршрута</strong><span>Можно сохранить как согласованное исключение.</span></div>\n                  <label class="toggle-row"><input type="checkbox" id="routeException" /><span><strong>Сохранить как исключение</strong><small>Курьер увидит отметку «Вне маршрута».</small></span></label>\n                  <div class="field-grid two route-exception-fields">\n                    <label class="field">Причина<select id="routeExceptionReason"><option value="">Выберите причину</option><option>По просьбе клиента</option><option>Перенос ранее оформленной заявки</option><option>Попутный адрес</option><option>Срочный заказ</option><option>Согласовано с курьером</option><option>Отдельная договорённость</option><option>Другое</option></select></label>\n                    <label class="field">Доплата<input type="number" id="routeExceptionFee" min="0" step="50" placeholder="0" /></label>\n                    <label class="field">Кто согласовал<input id="routeExceptionApprovedBy" placeholder="Например, Игорь" /></label>\n                    <label class="field">Комментарий<input id="routeExceptionComment" placeholder="Что важно знать курьеру" /></label>\n                  </div>\n                </div>\n              </section>'''
          if old not in s: raise SystemExit('hint marker missing')
          p.write_text(s.replace(old,new,1),encoding='utf-8')
          PY
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/manager-planner-ui.yml
          git add index.html
          git commit -m "Add manager planner UI"
          git push
