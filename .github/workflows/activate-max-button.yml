name: Activate MAX quick action

on:
  push:
    paths:
      - '.github/workflows/activate-max-button.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Make MAX badge interactive
        run: |
          python3 - <<'PY'
          from pathlib import Path

          app_path = Path('app.js')
          app = app_path.read_text(encoding='utf-8')

          old_source = '''function sourceBadge(data = {}) {
            const source = cleanShortField(data.orderSource || '');
            if (!source) return '';
            const isMax = /^(макс|max)$/i.test(source);
            return `<span class="quick-badge source-badge${isMax ? ' max-badge' : ''}">${isMax ? 'MAX' : escapeHtml(source)}</span>`;
          }'''
          new_source = '''function sourceBadge(data = {}) {
            const source = cleanShortField(data.orderSource || '');
            if (!source) return '';
            const isMax = /^(макс|max)$/i.test(source);
            if (!isMax) return `<span class="quick-badge source-badge">${escapeHtml(source)}</span>`;
            const phone = normalizePhone(data.phone || '');
            if (!phone) return '<span class="quick-badge source-badge max-badge max-disabled" title="Телефон клиента не указан">MAX</span>';
            return `<button type="button" class="quick-badge source-badge max-badge max-action" data-max-phone="${escapeHtml(phone)}" title="Скопировать номер и открыть MAX">MAX</button>`;
          }

          function copyTextFallback(value) {
            const textarea = document.createElement('textarea');
            textarea.value = value;
            textarea.setAttribute('readonly', '');
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            try { document.execCommand('copy'); } catch {}
            textarea.remove();
          }

          async function openMaxContact(phone) {
            const normalized = normalizePhone(phone || '');
            if (!normalized) return showToast('В заявке не указан телефон клиента.', 'error');
            window.open('https://max.ru/', '_blank', 'noopener');
            try {
              if (navigator.clipboard?.writeText) await navigator.clipboard.writeText(normalized);
              else copyTextFallback(normalized);
              showToast(`Номер ${normalized} скопирован. Вставьте его в поиск MAX.`, 'success');
            } catch {
              copyTextFallback(normalized);
              showToast(`MAX открыт. Номер клиента: ${normalized}`, 'success');
            }
          }'''
          if old_source not in app:
            raise SystemExit('sourceBadge block not found')
          app = app.replace(old_source, new_source, 1)

          marker = "  qsa('[data-toggle-comment]', root).forEach(button => {"
          binding = """  qsa('[data-max-phone]', root).forEach(button => button.addEventListener('click', event => {
            event.preventDefault();
            event.stopPropagation();
            openMaxContact(button.dataset.maxPhone);
          }));
          """
          if marker not in app:
            raise SystemExit('binding marker not found')
          app = app.replace(marker, binding + marker, 1)
          app_path.write_text(app, encoding='utf-8')

          styles_path = Path('styles.css')
          styles = styles_path.read_text(encoding='utf-8')
          extra = '''

          /* Active MAX shortcut */
          .max-action {
            border: 0;
            font: inherit;
            cursor: pointer;
            transition: transform .16s ease, box-shadow .16s ease, background .16s ease;
          }
          .max-action:hover { transform: translateY(-1px); box-shadow: 0 7px 18px rgba(89,55,164,.18); }
          .max-action:active { transform: translateY(0) scale(.97); }
          .max-disabled { opacity: .55; cursor: not-allowed; }
          '''
          if '/* Active MAX shortcut */' not in styles:
            styles += extra
          styles_path.write_text(styles, encoding='utf-8')

          sw_path = Path('sw.js')
          sw = sw_path.read_text(encoding='utf-8')
          if "pmk-calendar-v24" not in sw:
            raise SystemExit('Unexpected service worker cache version')
          sw = sw.replace('pmk-calendar-v24', 'pmk-calendar-v25', 1)
          sw_path.write_text(sw, encoding='utf-8')
          PY

      - name: Validate
        run: |
          node --check app.js
          grep -q 'data-max-phone' app.js
          grep -q 'openMaxContact' app.js
          grep -q 'Active MAX shortcut' styles.css
          grep -q 'pmk-calendar-v25' sw.js

      - name: Commit and remove workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/activate-max-button.yml
          git add app.js styles.css sw.js
          git commit -m "Activate MAX quick action"
          git push
