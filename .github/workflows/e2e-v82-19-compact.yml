name: E2E PMK v82.19 Compact

on:
  pull_request:
    branches: [main]
    paths:
      - 'period-direct-v82-19.js'
      - 'period-direct-v82-19.css'
      - 'test-v82-19.html'
      - 'ci-check-v82-19.mjs'
      - 'ci-assemble-v82-19.py'
      - '.github/workflows/e2e-v82-19-compact.yml'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Prepare exact test
        run: |
          git clone -q --branch "$GITHUB_HEAD_REF" --depth 1 "https://github.com/$GITHUB_REPOSITORY.git" /tmp/src
          cd /tmp/src
          git fetch -q --depth 1 origin 58f8368d6d35a007e661f28b0b46a4e3aa9824e7
          python3 ci-assemble-v82-19.py
      - name: Install Chromium
        run: |
          cd /tmp/src
          npm install --silent playwright@1.52.0
          npx playwright install --with-deps chromium >/dev/null 2>&1
      - name: Verify mobile Day Week Month
        run: |
          cd /tmp/pmk-v82-19
          python3 -m http.server 8000 >/tmp/pmk-v82-19-http.log 2>&1 &
          cd /tmp/src
          sleep 2
          node ci-check-v82-19.mjs
