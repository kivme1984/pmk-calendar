name: E2E PMK v82.19 Stable Proof

on:
  pull_request:
    branches: [main]
    paths:
      - 'period-direct-v82-19.js'
      - 'period-direct-v82-19.css'
      - 'week-touch-scroll-v82-20.js'
      - 'week-touch-scroll-v82-20.css'
      - 'stable-version-label-v82-19.js'
      - 'stable-version-label-v82-19.css'
      - 'test-v82-19.html'
      - 'ci-check-v82-19.mjs'
      - 'ci-assemble-v82-19.py'
      - '.github/workflows/e2e-v82-19-proof.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: python3 ci-assemble-v82-19.py
      - run: npm install --silent playwright@1.52.0
      - run: npx playwright install --with-deps chromium >/dev/null 2>&1
      - run: cd /tmp/pmk-v82-19 && python3 -m http.server 8000 >/tmp/pmk-v82-19-http.log 2>&1 &
      - run: sleep 2 && node ci-check-v82-19.mjs
