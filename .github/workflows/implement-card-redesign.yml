name: Implement request card redesign

on:
  push:
    paths:
      - '.github/scripts/implement-card-redesign.py'

permissions:
  contents: write

jobs:
  implement:
    if: github.event.head_commit.message != 'Implement request card redesign'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply redesign
        run: python3 .github/scripts/implement-card-redesign.py

      - name: Validate implementation
        run: |
          node --check app.js
          node --check sw.js
          grep -q 'function openEventDetails' app.js
          grep -q 'data-contract-toggle' app.js
          grep -q 'PMK request card redesign v1' styles.css
          grep -q "pmk-calendar-v23" sw.js

      - name: Commit implementation and remove one-time files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/implement-card-redesign.yml .github/scripts/implement-card-redesign.py
          git add app.js styles.css sw.js
          git commit -m "Implement request card redesign"
          git push
