name: Validate PMK Calendar v47

on:
  push:
    paths:
      - '.github/workflows/validate-v47.yml'

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate JavaScript syntax
        run: |
          node --check smart-parser-v45.js
          node --check smart-parser-v47.js
          node --check smart-parser-v47-name-fix.js
          node --check complete-pricing-v45.js
          node --check sw.js

      - name: Test exact dictated rug assignment
        run: |
          cat > /tmp/test-v47.js <<'NODE'
          global.window = global;
          global.document = { readyState: 'loading', addEventListener() {} };
          global.state = { selectedDayKey: '2026-06-28' };
          global.businessTodayKey = () => '2026-06-28';
          global.dateKeyForDisplay = key => new Date(`${key}T12:00:00Z`);
          global.addDaysToKey = (key, days) => { const d = new Date(`${key}T12:00:00Z`); d.setUTCDate(d.getUTCDate() + days); return d.toISOString().slice(0, 10); };
          global.addMinutesToTime = (value, minutes) => { const [h,m] = value.split(':').map(Number); const total = h*60+m+minutes; return `${String(Math.floor(total/60)%24).padStart(2,'0')}:${String(total%60).padStart(2,'0')}`; };
          global.REQUEST_DURATION_MINUTES = 30;
          global.setTimeout = () => 0;
          require(process.cwd() + '/smart-parser-v45.js');
          require(process.cwd() + '/smart-parser-v47.js');
          require(process.cwd() + '/smart-parser-v47-name-fix.js');

          const parse = global.PMK_SMART_PARSER_V45.parseText;
          const first = parse('Клиентка Марина, два ковра: один синтетика средний ворс, второй шегги. На первом пятна, на втором поднятие ворса.');
          const check = (ok, label, data) => { if (!ok) throw new Error(`${label}\n${JSON.stringify(data, null, 2)}`); };

          check(first.customerName === 'Марина', 'Не распознано имя Марина', first);
          check(first.rugs.length === 2, 'Не созданы два ковра', first);
          check(first.rugs[0].material === 'Синтетика', 'Материал первого ковра', first);
          check(first.rugs[0].pile === 'До 1 см', 'Средний ворс первого ковра', first);
          check(first.rugs[0].services.includes('Удаление пятен'), 'Пятна должны относиться к первому ковру', first);
          check(first.rugs[1].material === 'Синтетика', 'Шегги должен быть синтетикой', first);
          check(first.rugs[1].pile === 'Более 1 см', 'Шегги должен иметь высокий ворс', first);
          check(first.rugs[1].services.includes('Подъём ворса'), 'Поднятие ворса должно относиться ко второму ковру', first);
          check(!first.rugs[0].services.includes('Подъём ворса'), 'Поднятие ворса ошибочно попало к первому ковру', first);
          check(!first.rugs[1].services.includes('Удаление пятен'), 'Пятна ошибочно попали ко второму ковру', first);

          const second = parse('Зовут Ольга. Два ковра. Первый ковёр размер два на три, синтетика, средний ворс. Второй ковёр размер полтора на два, шегги. Для первого удаление пятен. Для второго расчёсывание ворса.');
          check(second.customerName === 'Ольга', 'Не распознано имя после слова зовут', second);
          check(second.rugs.length === 2, 'Не распознаны два подробных ковра', second);
          check(second.rugs[0].length === 2 && second.rugs[0].width === 3, 'Размер первого ковра', second);
          check(second.rugs[1].length === 1.5 && second.rugs[1].width === 2, 'Размер второго ковра', second);
          check(second.rugs[0].services.includes('Удаление пятен'), 'Услуга первого ковра', second);
          check(second.rugs[1].services.includes('Подъём ворса'), 'Услуга второго ковра', second);
          NODE
          node /tmp/test-v47.js

      - name: Validate discount policy and release wiring
        run: |
          grep -q "function suggestedDiscount()" complete-pricing-v45.js
          grep -q "return qs('#regularCustomer')?.checked ? 10 : 0" complete-pricing-v45.js
          ! grep -q "rugs.length >= 2" complete-pricing-v45.js
          grep -q "smart-parser-v47.js" sw.js
          grep -q "smart-parser-v47-name-fix.js" sw.js
          grep -q "pmk-calendar-v47" sw.js
          grep -q '"version": "47"' version.json

      - name: Remove one-time workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/validate-v47.yml
          git commit -m "Complete v47 validation"
          git push
