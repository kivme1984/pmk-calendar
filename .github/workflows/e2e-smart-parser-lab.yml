name: Smart Parser Lab Mobile Check

on:
  pull_request:
    branches: [main]
    paths:
      - 'smart-parser-lab.html'
      - 'smart-parser-lab.css'
      - 'smart-parser-lab.js'
      - 'smart-parser-next-core.js'
      - 'smart-parser-next.js'
      - 'smart-parser-next-refinements.js'
      - 'smart-parser-next-real-rules.js'
      - 'ci-check-smart-parser-lab.mjs'
      - '.github/workflows/e2e-smart-parser-lab.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lab-mobile:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install --silent playwright@1.52.0
      - run: npx playwright install --with-deps chromium >/dev/null 2>&1
      - run: python3 -m http.server 8000 >/tmp/smart-parser-lab-http.log 2>&1 &
      - run: sleep 2 && node ci-check-smart-parser-lab.mjs
