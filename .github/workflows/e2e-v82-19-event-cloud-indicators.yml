name: E2E Stable v82.19 Event Cloud Indicators

on:
  pull_request:
    branches: [main]
    paths:
      - 'test-v82-19.html'
      - 'event-cloud-indicators-v82-19.js'
      - 'event-cloud-indicators-v82-19.css'
      - 'ci-assemble-v82-19.py'
      - 'ci-check-v82-19-event-cloud-indicators.mjs'
      - '.github/workflows/e2e-v82-19-event-cloud-indicators.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: python3 ci-assemble-v82-19.py
      - run: npm install --silent playwright@1.52.0
      - run: npx playwright install --with-deps chromium >/dev/null 2>&1
      - run: cd /tmp/pmk-v82-19 && python3 -m http.server 8000 >/tmp/pmk-v82-19-cloud-http.log 2>&1 &
      - id: cloud_test
        continue-on-error: true
        run: sleep 2 && node ci-check-v82-19-event-cloud-indicators.mjs > cloud-indicators-test.log 2>&1
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: event-cloud-indicators-test-log
          path: cloud-indicators-test.log
          if-no-files-found: error
      - if: steps.cloud_test.outcome == 'failure'
        run: cat cloud-indicators-test.log && exit 1
