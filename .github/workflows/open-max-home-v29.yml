name: Open MAX home after copying phone

on:
  push:
    paths:
      - '.github/workflows/open-max-home-v29.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove MAX share screen
        run: |
          python3 - <<'PY'
          from pathlib import Path

          app_path = Path('app.js')
          app = app_path.read_text(encoding='utf-8')

          old = '''  const shareUrl = `https://max.ru/:share?text=${encodeURIComponent(normalized)}`;
            if (/Android/i.test(navigator.userAgent)) {
              const fallback = encodeURIComponent(shareUrl);
              const text = encodeURIComponent(normalized);
              window.location.href = `intent://max.ru/:share?text=${text}#Intent;scheme=https;package=ru.oneme.app;S.browser_fallback_url=${fallback};end`;
              return;
            }

            window.location.href = shareUrl;'''

          new = '''  const maxHomeUrl = 'https://max.ru/';
            if (/Android/i.test(navigator.userAgent)) {
              const fallback = encodeURIComponent(maxHomeUrl);
              window.location.href = `intent://max.ru/#Intent;scheme=https;package=ru.oneme.app;S.browser_fallback_url=${fallback};end`;
              return;
            }

            window.location.href = maxHomeUrl;'''

          if old not in app:
              raise SystemExit('MAX share block not found')
          app = app.replace(old, new, 1)
          app_path.write_text(app, encoding='utf-8')

          index_path = Path('index.html')
          index = index_path.read_text(encoding='utf-8')
          index = index.replace('styles.css?v=28', 'styles.css?v=29')
          index = index.replace('app.js?v=28', 'app.js?v=29')
          index_path.write_text(index, encoding='utf-8')

          reset_path = Path('reset.html')
          reset = reset_path.read_text(encoding='utf-8')
          reset = reset.replace('?v=28&reset=', '?v=29&reset=')
          reset_path.write_text(reset, encoding='utf-8')

          sw_path = Path('sw.js')
          sw = sw_path.read_text(encoding='utf-8')
          sw = sw.replace('pmk-calendar-v28', 'pmk-calendar-v29')
          sw = sw.replace('styles.css?v=28', 'styles.css?v=29')
          sw = sw.replace('app.js?v=28', 'app.js?v=29')
          sw_path.write_text(sw, encoding='utf-8')
          PY

      - name: Validate
        run: |
          node --check app.js
          grep -q 'intent://max.ru/#Intent' app.js
          ! grep -q 'max.ru/:share' app.js
          grep -q 'app.js?v=29' index.html
          grep -q 'pmk-calendar-v29' sw.js

      - name: Commit and clean up
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/open-max-home-v29.yml
          git add app.js index.html reset.html sw.js
          git commit -m "Open MAX home after copying phone"
          git push
