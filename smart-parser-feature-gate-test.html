<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow">
  <title>ПМК · Проверка переключателя умного ввода</title>
  <style>
    html,body{margin:0;min-height:100%;background:#171717;color:#fff;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .boot{min-height:100vh;display:grid;place-items:center;padding:24px;text-align:center}.boot strong{font-size:24px}.boot span{display:block;margin-top:8px;opacity:.72}
  </style>
</head>
<body>
  <div class="boot"><div><strong>Загружаю календарь</strong><span>Проверяется только переключатель умного ввода.</span></div></div>
  <script>
    (async () => {
      const response = await fetch(`./index.html?feature-gate-source=${Date.now()}`, { cache: 'no-store' });
      if (!response.ok) throw new Error(`Не удалось загрузить форму: ${response.status}`);
      let html = await response.text();
      html = html.replace('<title>ПМК Календарь</title>', '<title>ПМК · Проверка переключателя умного ввода</title>');
      html = html.replace('</body>', '<script src="./smart-parser-feature-gate.js?v=1" defer></' + 'script></body>');
      document.open();
      document.write(html);
      document.close();
    })().catch(error => {
      document.body.innerHTML = `<div class="boot"><div><strong>Проверка не загрузилась</strong><span>${String(error.message || error)}</span></div></div>`;
    });
  </script>
</body>
</html>
