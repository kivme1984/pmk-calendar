<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Безопасный запуск ПМК</title>
<style>
body{margin:0;min-height:100dvh;display:grid;place-items:center;padding:16px;box-sizing:border-box;font-family:Arial,sans-serif;color:#f5f5f5;background:#111}main{width:min(560px,100%);padding:24px;border:1px solid #343434;border-radius:18px;background:#1a1a1a}h1{margin:0 0 10px;font-size:25px}p{margin:0 0 8px;color:#c9c9c9;line-height:1.5}.status{margin-top:16px;color:#ffd15c}.error{color:#ff9b90}.actions{display:grid;gap:10px;margin-top:18px}button,a{width:100%;min-height:48px;display:grid;place-items:center;border:0;border-radius:12px;padding:0 16px;box-sizing:border-box;font-weight:800;font-size:15px;text-decoration:none}button{color:#171717;background:#f7b500}a{color:#fff;background:#303030}
</style>
</head>
<body>
<main>
<h1 id="title">Безопасный запуск</h1>
<p id="description">Запускаем базовую версию напрямую, без повреждённого service worker. Заявки, настройки и черновики остаются на устройстве.</p>
<p id="status" class="status">Подготовка…</p>
<div class="actions">
<button id="retry" type="button" hidden>Повторить</button>
<a id="recovery" href="./recovery.html?force=82" hidden>Вернуть стабильную v82</a>
</div>
</main>
<script>
(() => {
  const params=new URLSearchParams(location.search);
  const testName=params.get('test')||'';

  if(testName==='day-card-compact-v1'){
    const status=document.querySelector('#status');
    status.textContent='Открываем тестовую страницу карточек дня…';
    fetch('./day-card-compact-test-v1.html?preview='+Date.now(),{cache:'no-store'})
      .then(response=>{if(!response.ok)throw new Error('day-card-compact-test-v1.html: '+response.status);return response.text();})
      .then(html=>{document.open();document.write(html);document.close();})
      .catch(error=>{status.className='status error';status.textContent='Тестовая страница не открылась: '+error.message;document.querySelector('#retry').hidden=false;});
    document.querySelector('#retry').addEventListener('click',()=>location.reload());
    return;
  }

  const workflowTest=testName==='ui-workflow-v4';
  const statusTest=testName==='ui-swipe-note-status-v3'||workflowTest;
  const noteTest=testName==='ui-swipe-note-v2'||statusTest;
  const testMode=testName==='ui-swipe-v1'||noteTest;
  const installVersion=params.get('install')||'';
  const installMode=installVersion==='82-1'||installVersion==='82-2';
  const title=document.querySelector('#title');
  const description=document.querySelector('#description');
  const status=document.querySelector('#status');
  const retry=document.querySelector('#retry');
  const recovery=document.querySelector('#recovery');
  const DATA_CACHE='pmk-calendar-data-v68';

  if(installVersion==='82-2'){
    title.textContent='Устанавливаем тестовую v82.2';
    description.textContent='Рабочая v82.1 с проверенной шапкой, свайпами и заметкой, плюс четыре кнопки статуса в левой колонке сверху вниз.';
  }else if(installVersion==='82-1'){
    title.textContent='Устанавливаем v82.1';
    description.textContent='Стабильная v82 с проверенной шапкой, рабочей кнопкой обновления, свайпами во все стороны и улучшенной плавающей заметкой.';
  }else if(workflowTest){
    title.textContent='Тест v82.6 · моментальный переход карточек';
    description.textContent='Проверяем строгий маршрут статусов без дублей: Сегодня → В работе → К выдаче → Выполнено → Архив.';
  }else if(statusTest){
    title.textContent='Тест v82.2 · статусы слева';
    description.textContent='Проверяем одобренную шапку, свайпы и заметку, а также четыре кнопки статуса в левой колонке сверху вниз.';
  }else if(noteTest){
    title.textContent='Тест v82.1 · заметка';
    description.textContent='Проверяем уже одобренную шапку и свайпы, а также положение заметки и две кнопки-символа: вставить и скопировать.';
  }else if(testMode){
    title.textContent='Тест v82 · шапка и свайпы';
    description.textContent='Рабочая v82 остаётся без изменений. Здесь отдельно проверяются статусы календарей, кнопка «Обновить» и управление режимами «3 дня» и «Неделя».';
  }

  async function removeWorkersAndCaches(){
    if('serviceWorker' in navigator){
      const registrations=await navigator.serviceWorker.getRegistrations();
      await Promise.all(registrations.map(item=>item.unregister().catch(()=>false)));
    }
    if('caches' in window){
      const keys=await caches.keys();
      await Promise.all(keys.filter(key=>key!==DATA_CACHE&&key.startsWith('pmk-calendar-')).map(key=>caches.delete(key).catch(()=>false)));
    }
  }

  async function preflight(urls,stamp){
    const responses=await Promise.all(urls.map(url=>fetch(`${url}${url.includes('?')?'&':'?'}check=${stamp}`,{cache:'no-store'})));
    if(responses.some(response=>!response.ok))throw new Error('Не все файлы ещё опубликованы');
    return Promise.all(responses.map(response=>response.text()));
  }

  function waitForActivation(registration,version){
    const worker=registration.installing||registration.waiting||registration.active;
    if(!worker||worker.state==='activated')return Promise.resolve();
    return new Promise((resolve,reject)=>{
      const timer=setTimeout(()=>reject(new Error(`v${version} не активировалась за 90 секунд`)),90000);
      worker.addEventListener('statechange',()=>{
        if(worker.state==='activated'){clearTimeout(timer);resolve();}
        if(worker.state==='redundant'){clearTimeout(timer);reject(new Error(`Установка v${version} была отклонена браузером`));}
      });
    });
  }

  function packageFor(version){
    if(version==='82-2')return {
      worker:'./sw-v82-2.js',
      workerMarker:'sw-core-v82-2.js',
      coreMarker:"const VERSION='82.2'",
      guardMarker:"const VERSION = '82.2'",
      files:['./sw-v82-2.js','./sw-core-v82-2.js','./version-guard-v82-2.js','./keep-worker-v82-2.js','./test-v82-ui-swipe-v1.js','./test-v82-ui-swipe-v1.css','./floating-note-mobile-v82-1.js','./floating-note-mobile-v82-1.css','./status-left-column-v82-2.js','./status-left-column-v82-2.css'],
    };
    return {
      worker:'./sw-v82-1.js',
      workerMarker:'sw-core-v82-1.js',
      coreMarker:"const VERSION='82.1'",
      guardMarker:"const VERSION = '82.1'",
      files:['./sw-v82-1.js','./sw-core-v82-1.js','./version-guard-v82-1.js','./keep-worker-v82-1.js','./test-v82-ui-swipe-v1.js','./test-v82-ui-swipe-v1.css','./floating-note-mobile-v82-1.js','./floating-note-mobile-v82-1.css'],
    };
  }

  async function installCandidate(version){
    retry.hidden=true;
    recovery.hidden=true;
    status.className='status';
    try{
      const stamp=Date.now();
      const pack=packageFor(version);
      status.textContent=`Проверяем пакет v${version}…`;
      const texts=await preflight(pack.files,stamp);
      if(!texts[0].includes(pack.workerMarker))throw new Error(`Неверная точка запуска v${version}`);
      if(!texts[1].includes(pack.coreMarker))throw new Error(`Неверный основной пакет v${version}`);
      if(!texts[2].includes(pack.guardMarker))throw new Error(`Неверный контроль версии v${version}`);
      if(!texts[4].includes('PMK_V82_UI_SWIPE_TEST_V1'))throw new Error('Не найдено исправление шапки и свайпов');
      if(!texts[6].includes('PMK_FLOATING_NOTE_MOBILE_V82_1'))throw new Error('Не найдено исправление заметки');
      if(version==='82-2'&&!texts[8].includes('PMK_STATUS_LEFT_COLUMN_V82_2'))throw new Error('Не найдено исправление вертикальных статусов');

      status.textContent='Отключаем прежнюю сборку…';
      await removeWorkersAndCaches();
      if(!('serviceWorker' in navigator))throw new Error('Chrome не поддерживает установку приложения');

      status.textContent=`Собираем v${version}…`;
      const registration=await navigator.serviceWorker.register(`${pack.worker}?v=${version}-${stamp}`,{scope:'./',updateViaCache:'none'});
      await registration.update().catch(()=>null);
      await waitForActivation(registration,version);

      status.textContent=`v${version} установлена. Открываем календарь…`;
      setTimeout(()=>location.replace(`./?v=${version}&installed=${Date.now()}`),900);
    }catch(error){
      status.className='status error';
      status.textContent=`Установка остановилась: ${error.message}`;
      retry.hidden=false;
      recovery.hidden=false;
    }
  }

  async function launchDirect(){
    retry.hidden=true;
    recovery.hidden=true;
    status.className='status';
    try{
      const stamp=Date.now();
      const testUrls=['./test-v82-ui-swipe-v1.js','./test-v82-ui-swipe-v1.css'];
      if(noteTest)testUrls.push('./floating-note-mobile-v82-1.js','./floating-note-mobile-v82-1.css');
      if(statusTest)testUrls.push('./status-left-column-v82-2.js','./status-left-column-v82-2.css');
      if(workflowTest)testUrls.push('./workflow-cards-v82-3.js','./workflow-cards-v82-3.css','./day-route-header-v82-4.js','./day-route-header-v82-4.css','./minimal-header-menu-month-v82-5.js','./minimal-header-menu-month-v82-5.css','./exclusive-status-router-v82-6.js','./exclusive-status-router-v82-6.css');
      if(testMode){
        status.textContent='Проверяем отдельную тестовую версию…';
        await preflight(testUrls,stamp);
      }else{
        status.textContent='Отключаем повреждённый кэш…';
        await removeWorkersAndCaches();
      }

      status.textContent=testMode?'Загружаем v82 с тестовыми исправлениями…':'Загружаем приложение напрямую…';
      const response=await fetch(`./index.html?safe-source=${stamp}`,{cache:'no-store'});
      if(!response.ok)throw new Error(`index.html: ${response.status}`);
      let html=await response.text();
      const closeScript='</scr'+'ipt>';
      const guard=`<script>
        window.PMK_SAFE_MODE=true;
        window.PMK_V82_ISOLATED_TEST=${testMode?'true':'false'};
        try{
          if(navigator.serviceWorker){
            Object.defineProperty(navigator.serviceWorker,'register',{configurable:true,value:()=>Promise.resolve({active:navigator.serviceWorker.controller||null})});
          }
        }catch(e){}
      ${closeScript}`;

      html=html.replace(/<link rel="manifest"[^>]*>/i,'');
      if(testMode){
        const extraCss=`<link rel="stylesheet" href="test-v82-ui-swipe-v1.css?test=${stamp}">${noteTest?`<link rel="stylesheet" href="floating-note-mobile-v82-1.css?test=${stamp}">`:''}${statusTest?`<link rel="stylesheet" href="status-left-column-v82-2.css?test=${stamp}">`:''}${workflowTest?`<link rel="stylesheet" href="workflow-cards-v82-3.css?test=${stamp}"><link rel="stylesheet" href="day-route-header-v82-4.css?test=${stamp}"><link rel="stylesheet" href="minimal-header-menu-month-v82-5.css?test=${stamp}"><link rel="stylesheet" href="exclusive-status-router-v82-6.css?test=${stamp}">`:''}`;
        const extraJs=`<script src="test-v82-ui-swipe-v1.js?test=${stamp}" defer>${closeScript}${noteTest?`<script src="floating-note-mobile-v82-1.js?test=${stamp}" defer>${closeScript}`:''}${statusTest?`<script src="status-left-column-v82-2.js?test=${stamp}" defer>${closeScript}`:''}${workflowTest?`<script src="workflow-cards-v82-3.js?test=${stamp}" defer>${closeScript}<script src="day-route-header-v82-4.js?test=${stamp}" defer>${closeScript}<script src="minimal-header-menu-month-v82-5.js?test=${stamp}" defer>${closeScript}<script src="exclusive-status-router-v82-6.js?test=${stamp}" defer>${closeScript}`:''}`;
        html=html.replace(/<link rel="stylesheet"[^>]*>/i,match=>`${match}${extraCss}`);
        html=html.replace(/<script\s+src="app\.js(?:\?[^\"]*)?"\s+defer><\/script>/i,`${guard}<script src="app.js?test-base=${stamp}" defer>${closeScript}${extraJs}`);
        html=html.replace('<title>ПМК Календарь</title>',workflowTest?'<title>ПМК Календарь · тест v82.6</title>':statusTest?'<title>ПМК Календарь · тест v82.2</title>':noteTest?'<title>ПМК Календарь · тест v82.1</title>':'<title>ПМК Календарь · тест v82</title>');
      }else{
        html=html.replace(/<script\s+src="app\.js(?:\?[^\"]*)?"\s+defer><\/script>/i,`${guard}<script src="app.js?safe=${stamp}" defer>${closeScript}`);
      }

      document.open();
      document.write(html);
      document.close();
    }catch(error){
      status.className='status error';
      status.textContent=`Запуск не выполнен: ${error.message}`;
      retry.hidden=false;
      recovery.hidden=false;
    }
  }

  retry.addEventListener('click',()=>installMode?installCandidate(installVersion):launchDirect());
  installMode?installCandidate(installVersion):launchDirect();
})();
</script>
</body>
</html>
