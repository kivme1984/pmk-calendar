<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Прямой запуск ПМК</title>
<style>
body{margin:0;min-height:100dvh;display:grid;place-items:center;padding:16px;box-sizing:border-box;font-family:Arial,sans-serif;color:#f5f5f5;background:#111}main{width:min(560px,100%);padding:24px;border:1px solid #343434;border-radius:18px;background:#1a1a1a}h1{margin:0 0 10px;font-size:25px}p{margin:0;color:#c9c9c9;line-height:1.5}.status{margin-top:16px;color:#ffd15c}.error{color:#ff9b90}button{width:100%;min-height:48px;margin-top:18px;border:0;border-radius:12px;color:#171717;background:#f7b500;font-weight:800;font-size:15px}
</style>
</head>
<body>
<main>
<h1>Прямой запуск ПМК</h1>
<p>Открываем календарь напрямую из файлов сайта — без установки и без service worker.</p>
<p id="status" class="status">Отключаем зависшую версию…</p>
<button id="retry" type="button" hidden>Повторить запуск</button>
</main>
<script>
(() => {
  const status=document.querySelector('#status');
  const retry=document.querySelector('#retry');

  async function launch(){
    retry.hidden=true;
    status.className='status';
    try{
      status.textContent='Отключаем зависшую версию…';
      if('serviceWorker' in navigator){
        const registrations=await navigator.serviceWorker.getRegistrations();
        await Promise.all(registrations.map(item=>item.unregister().catch(()=>false)));
      }
      if('caches' in window){
        const keys=await caches.keys();
        await Promise.all(keys.filter(key=>key!=='pmk-calendar-data-v68'&&key.startsWith('pmk-calendar-')).map(key=>caches.delete(key).catch(()=>false)));
      }

      status.textContent='Загружаем рабочие файлы…';
      const stamp=Date.now();
      const [indexResponse,cssResponse,appResponse]=await Promise.all([
        fetch(`./index.html?direct=${stamp}`,{cache:'no-store'}),
        fetch(`./styles.css?direct=${stamp}`,{cache:'no-store'}),
        fetch(`./app.js?direct=${stamp}`,{cache:'no-store'})
      ]);
      if(!indexResponse.ok||!cssResponse.ok||!appResponse.ok)throw new Error('Не удалось получить основные файлы приложения');

      let html=await indexResponse.text();
      const css=await cssResponse.text();
      let app=await appResponse.text();
      app=app.replace(/function\s+registerServiceWorker\s*\(\)\s*\{[\s\S]*?\n\}/,'function registerServiceWorker() {}');
      app=app.replace(/<\/script/gi,'<\\/script');

      html=html.replace(/<link rel="manifest"[^>]*>/i,'');
      html=html.replace(/<link rel="stylesheet"[^>]*>/i,`<style>${css}</style>`);
      html=html.replace(/<script\s+src="app\.js(?:\?[^\"]*)?"\s+defer><\/script>/i,`<script>${app}<\/script>`);

      status.textContent='Открываем календарь…';
      document.open();
      document.write(html);
      document.close();
    }catch(error){
      status.className='status error';
      status.textContent=`Прямой запуск не выполнен: ${error.message}`;
      retry.hidden=false;
    }
  }

  retry.addEventListener('click',launch);
  launch();
})();
</script>
</body>
</html>
