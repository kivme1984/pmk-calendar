<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Безопасный запуск ПМК</title>
<style>
body{margin:0;min-height:100dvh;display:grid;place-items:center;padding:16px;box-sizing:border-box;font-family:Arial,sans-serif;color:#f5f5f5;background:#111}main{width:min(560px,100%);padding:24px;border:1px solid #343434;border-radius:18px;background:#1a1a1a}h1{margin:0 0 10px;font-size:25px}p{margin:0 0 8px;color:#c9c9c9;line-height:1.5}.status{margin-top:16px;color:#ffd15c}.error{color:#ff9b90}button{width:100%;min-height:48px;margin-top:18px;border:0;border-radius:12px;color:#171717;background:#f7b500;font-weight:800;font-size:15px}
</style>
</head>
<body>
<main>
<h1 id="title">Безопасный запуск</h1>
<p id="description">Запускаем базовую версию напрямую, без повреждённого service worker. Заявки, настройки и черновики остаются на устройстве.</p>
<p id="status" class="status">Подготовка…</p>
<button id="retry" type="button" hidden>Повторить запуск</button>
</main>
<script>
(() => {
  const params=new URLSearchParams(location.search);
  const testMode=params.get('test')==='ui-swipe-v1';
  const title=document.querySelector('#title');
  const description=document.querySelector('#description');
  const status=document.querySelector('#status');
  const retry=document.querySelector('#retry');
  const DATA_CACHE='pmk-calendar-data-v68';

  if(testMode){
    title.textContent='Тест v82 · шапка и свайпы';
    description.textContent='Рабочая v82 остаётся без изменений. Здесь отдельно проверяются статусы календарей, кнопка «Обновить» и управление режимами «3 дня» и «Неделя».';
  }

  async function cleanSafeMode(){
    if('serviceWorker' in navigator){
      const registrations=await navigator.serviceWorker.getRegistrations();
      await Promise.all(registrations.map(item=>item.unregister().catch(()=>false)));
    }
    if('caches' in window){
      const keys=await caches.keys();
      await Promise.all(keys.filter(key=>key!==DATA_CACHE&&key.startsWith('pmk-calendar-')).map(key=>caches.delete(key).catch(()=>false)));
    }
  }

  async function preflightTest(stamp){
    const urls=['./test-v82-ui-swipe-v1.js','./test-v82-ui-swipe-v1.css'];
    const responses=await Promise.all(urls.map(url=>fetch(`${url}?test=${stamp}`,{cache:'no-store'})));
    if(responses.some(response=>!response.ok))throw new Error('Тестовые файлы ещё не опубликованы');
  }

  async function launch(){
    retry.hidden=true;
    status.className='status';
    try{
      const stamp=Date.now();
      if(testMode){
        status.textContent='Проверяем отдельную тестовую версию…';
        await preflightTest(stamp);
      }else{
        status.textContent='Отключаем повреждённый кэш…';
        await cleanSafeMode();
      }

      status.textContent=testMode?'Загружаем рабочую v82 с тестовыми исправлениями…':'Загружаем приложение напрямую…';
      const response=await fetch(`./index.html?safe-source=${stamp}`,{cache:'no-store'});
      if(!response.ok)throw new Error(`index.html: ${response.status}`);
      let html=await response.text();

      const closeScript='</scr'+'ipt>';
      const guard=`<script>
        window.PMK_SAFE_MODE=true;
        window.PMK_V82_ISOLATED_TEST=${testMode?'true':'false'};
        try{
          if(navigator.serviceWorker){
            Object.defineProperty(navigator.serviceWorker,'register',{configurable:true,value:()=>Promise.resolve({active:navigator.serviceWorker.controller||null})});
          }
        }catch(e){}
      ${closeScript}`;

      html=html.replace(/<link rel="manifest"[^>]*>/i,'');

      if(testMode){
        html=html.replace(/<link rel="stylesheet"[^>]*>/i,match=>`${match}<link rel="stylesheet" href="test-v82-ui-swipe-v1.css?test=${stamp}">`);
        html=html.replace(/<script\s+src="app\.js(?:\?[^\"]*)?"\s+defer><\/script>/i,`${guard}<script src="app.js?test-base=${stamp}" defer>${closeScript}<script src="test-v82-ui-swipe-v1.js?test=${stamp}" defer>${closeScript}`);
        html=html.replace('<title>ПМК Календарь</title>','<title>ПМК Календарь · тест v82</title>');
      }else{
        html=html.replace(/<script\s+src="app\.js(?:\?[^\"]*)?"\s+defer><\/script>/i,`${guard}<script src="app.js?safe=${stamp}" defer>${closeScript}`);
      }

      document.open();
      document.write(html);
      document.close();
    }catch(error){
      status.className='status error';
      status.textContent=`Запуск не выполнен: ${error.message}`;
      retry.hidden=false;
    }
  }

  retry.addEventListener('click',launch);
  launch();
})();
</script>
</body>
</html>
